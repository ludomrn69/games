<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script src="/head.js" data-title="Les jeux 🎲" data-emoji="🎲"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="/firebase-init.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 880px; margin: 0 auto; padding: 78px 18px 60px; }

    .hero { text-align: center; margin-bottom: 30px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 9vw, 3.6rem); font-weight: 900;
      background: linear-gradient(135deg, var(--terracotta), var(--gold)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hero p { font-family: 'Caveat', cursive; font-size: 1.4rem; color: var(--ink-light); margin-top: 4px; }

    .join-bar { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; margin: 0 auto 34px; max-width: 460px; }
    .join-bar input { flex: 1; min-width: 140px; padding: 0.8rem 1rem; border: 1.5px solid var(--gold-light); border-radius: 14px;
      background: var(--white); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 1.1rem; text-align: center;
      letter-spacing: 0.3em; text-transform: uppercase; font-weight: 700; }
    .join-bar input:focus { outline: none; border-color: var(--gold); }
    .join-bar button { padding: 0.8rem 1.4rem; border: none; border-radius: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 700; background: linear-gradient(135deg, var(--terracotta), var(--gold)); color: #fff;
      box-shadow: 0 4px 16px rgba(196,116,90,0.28); transition: transform .2s; }
    .join-bar button:hover { transform: translateY(-2px); }

    .search-bar { position: relative; max-width: 460px; margin: 0 auto 30px; }
    .search-bar input { width: 100%; padding: 0.8rem 2.6rem 0.8rem 2.6rem; border: 1.5px solid var(--gold-light); border-radius: 14px;
      background: var(--white); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 1rem; }
    .search-bar input:focus { outline: none; border-color: var(--gold); }
    .search-bar .s-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; opacity: 0.7; }
    .search-bar .s-clear { position: absolute; right: 0.55rem; top: 50%; transform: translateY(-50%); border: none; background: none;
      cursor: pointer; font-size: 1.2rem; color: var(--ink-light); line-height: 1; padding: 4px 6px; display: none; }
    .search-bar.has-value .s-clear { display: block; }
    .search-empty { text-align: center; color: var(--ink-light); font-size: 0.95rem; margin: 10px 0 4px; display: none; }

    /* Étoile « favori » sur chaque carte de jeu */
    .fav-btn { position: absolute; top: 5px; right: 7px; border: none; background: none; cursor: pointer; font-size: 1.02rem;
      color: var(--gold-light); padding: 2px 4px; line-height: 1; transition: transform .15s, color .15s; z-index: 2; }
    .fav-btn:hover { transform: scale(1.25); color: var(--gold); }
    .fav-btn.on { color: var(--gold); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
    .cat-title { grid-column: 1 / -1; font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; color: var(--ink);
      margin: 18px 2px 2px; padding-bottom: 6px; border-bottom: 1.5px solid var(--gold-light); display: flex; align-items: center; gap: 8px; }
    .cat-title:first-child { margin-top: 0; }
    .card { position: relative; display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none;
      background: var(--white); border: 1px solid var(--gold-light); border-radius: 20px; padding: 22px 14px 18px; color: var(--ink);
      box-shadow: var(--shadow); transition: transform .22s cubic-bezier(0.34,1.56,0.64,1), box-shadow .22s; }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
    .card .emoji { font-size: 2.6rem; line-height: 1; }
    .card .name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.05rem; text-align: center; }
    .card .players { font-size: 0.78rem; color: var(--ink-light); }
    /* Pastille « jouable en solo contre l'ordi » : rassure que le jeu se lance
       seul même quand la fourchette affichée démarre à 2 (ex. Poker « 2–6 »). */
    .card .solo-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 1px;
      font-size: 0.66rem; font-weight: 800; line-height: 1; padding: 3px 8px; border-radius: 20px;
      color: var(--terracotta); background: rgba(196,116,90,0.12); border: 1px solid rgba(196,116,90,0.28); }
    .card.soon { opacity: 0.5; pointer-events: none; }
    .card.soon::after { content: 'bientôt'; position: absolute; top: 8px; right: 8px; font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: var(--gold); background: var(--cream); padding: 2px 7px; border-radius: 20px; }
    .card .off-badge { position: absolute; top: 7px; left: 8px; font-size: 0.85rem; line-height: 1; }
    .offline-note { text-align: center; color: var(--ink-light); font-size: 0.82rem; margin-top: 24px; line-height: 1.5; }
    .offline-note b { color: var(--ink); }

    .plane-check { display: flex; align-items: center; gap: 12px; max-width: 470px; margin: 16px auto 0; padding: 12px 16px;
      border-radius: 16px; border: 1.5px solid var(--gold-light); background: var(--white); box-shadow: var(--shadow); text-align: left; }
    .plane-check.ready { border-color: #7fb069; }
    .plane-check .pc-icon { font-size: 1.5rem; line-height: 1; }
    .plane-check .pc-text { flex: 1; }
    .plane-check .pc-title { font-weight: 700; font-size: 0.9rem; color: var(--ink); }
    .plane-check .pc-sub { font-size: 0.78rem; color: var(--ink-light); margin-top: 2px; }
    .plane-check .pc-btn { border: none; border-radius: 12px; padding: 0.55rem 0.95rem; font-weight: 700; font-family: 'DM Sans', sans-serif;
      cursor: pointer; background: linear-gradient(135deg, var(--terracotta), var(--gold)); color: #fff; font-size: 0.85rem; white-space: nowrap; }
    .plane-check .pc-btn[disabled] { opacity: 0.55; cursor: default; }
  </style>
</head>
<body>
  <script src="/nav.js"></script>
  <div class="wrap">
    <div class="hero">
      <h1>Les jeux</h1>
      <p>à jouer avec les copains</p>
    </div>

    <div class="join-bar">
      <input id="join-code" maxlength="5" placeholder="CODE" autocomplete="off" autocapitalize="characters" inputmode="text" aria-label="Code du salon">
      <button onclick="joinByCode()">Rejoindre une partie</button>
    </div>

    <div class="search-bar" id="search-bar">
      <span class="s-icon">🔍</span>
      <input id="game-search" type="search" placeholder="Rechercher un jeu…" autocomplete="off" aria-label="Rechercher un jeu">
      <button class="s-clear" id="search-clear" type="button" aria-label="Effacer">✕</button>
    </div>

    <div class="grid" id="grid"></div>

    <p class="search-empty" id="search-empty">Aucun jeu ne correspond à ta recherche.</p>

    <p class="offline-note">✈️ = jouable <b>hors-ligne</b> (solo contre l'ordi ou en local sur un seul appareil).<br>Ouvre le site une fois avec connexion, puis il fonctionne <b>sans réseau</b> (idéal en avion).</p>

    <div class="plane-check" id="plane-check" hidden>
      <span class="pc-icon" id="pc-icon">✈️</span>
      <div class="pc-text">
        <div class="pc-title" id="pc-title">Vérification du mode hors-ligne…</div>
        <div class="pc-sub" id="pc-sub"></div>
      </div>
      <button class="pc-btn" id="pc-btn" hidden onclick="preparePlane()">Préparer</button>
    </div>
  </div>

  <div class="lb-toast" id="lb-toast"></div>

  <script>
    var GAMES = [      { key: 'soiree',          name: 'Mode Soirée',     emoji: '🎉', players: '2–8',  on: true, type: 'tournoi multi-jeux' },

      { key: 'president',       name: 'Président',       emoji: '🤵', players: '3–8',  on: true, offline: true, solo: true, type: 'cartes' },
      { key: 'ludo',            name: 'Petits chevaux',   emoji: '🐴', players: '2–4',  on: true, offline: true, solo: true, type: 'plateau / dés' },
      { key: 'juste-prix',      name: 'Le juste prix',   emoji: '💰', players: '2–8',  on: true, offline: true, solo: true, type: 'déduction' },
      { key: 'telephone-dessine', name: 'Gartic Phone',  emoji: '🖍️', players: '3–10', on: true, type: 'dessin' },

      { key: 'cluedo',          name: 'Cluedo',          emoji: '🔎', players: '2–6',  on: true, offline: true, solo: true, type: 'déduction (plateau)' },

      { key: 'queens',          name: 'Queens',          emoji: '👑', players: '1–6',  on: true, offline: true, type: 'solo + course (chrono)' },
      { key: 'tango',           name: 'Tango',           emoji: '🌙', players: '1–6',  on: true, offline: true, type: 'solo + course (chrono)' },
      { key: 'zip',             name: 'Zip',             emoji: '🔗', players: '1–6',  on: true, offline: true, type: 'solo + course (chrono)' },
      { key: 'patches',         name: 'Patches',         emoji: '🧩', players: '1–6',  on: true, offline: true, type: 'solo + course (chrono)' },
      { key: 'sutom',           name: 'Sutom',           emoji: '🟥', players: '1–6',  on: true, offline: true, type: 'mot mystère (chrono)' },
      { key: 'solitaire',       name: 'Solitaire',       emoji: '🃏', players: '1–6',  on: true, offline: true, type: 'cartes solo (chrono)' },
      { key: 'balatro',         name: 'Balatro',         emoji: '🃏', players: '1',    on: true, offline: true, type: 'roguelike poker (solo)' },
      { key: 'millebornes',     name: 'Mille Bornes',    emoji: '🚗', players: '2–4',  on: true, offline: true, solo: true, type: 'cartes / course' },
      { key: 'loupgarou',       name: 'Loup-Garou',      emoji: '🐺', players: '4–12', on: true, offline: true, solo: true, type: 'déduction sociale (IA)' },
      { key: 'timesup',         name: "Time's Up",       emoji: '⏱️', players: '4–12', on: true, offline: true, type: 'équipes (4 min · + solo chrono)' },
      { key: 'lapaye',          name: 'La Bonne Paye',   emoji: '💰', players: '2–6',  on: true, offline: true, solo: true, type: 'gestion / cartes' },
      { key: 'diamants',        name: 'Diamants',        emoji: '💎', players: '2–8',  on: true, offline: true, solo: true, type: 'stop-ou-encore' },
      { key: 'perudo',          name: 'Perudo',          emoji: '🎲', players: '2–6',  on: true, offline: true, solo: true, type: 'dés / bluff' },
      { key: 'mini-metro',      name: 'Mini Métro',      emoji: '🚇', players: '1',    on: true, offline: true, type: 'gestion / réseau (solo)' },
      { key: 'mini-motorways',  name: 'Mini Motorways',  emoji: '🚗', players: '1',    on: true, offline: true, type: 'gestion / routes (solo)' },
      { key: 'nothanks',        name: 'No Thanks!',       emoji: '🙅', players: '2–7',  on: true, offline: true, solo: true, type: 'stop-ou-encore' },
      { key: 'yams',            name: "Yam's",           emoji: '🎲', players: '1–6',  on: true, offline: true, solo: true, type: 'dés / combinaisons' },
      { key: 'openfront',       name: 'OpenFront',       emoji: '🗺️', players: '1',    on: true, offline: true, type: 'stratégie / conquête (solo vs IA)' }
    ];
    // Rangement de l'accueil : les jeux sont GROUPÉS par grande famille (ordre
    // défini ici). Un jeu non rangé tombe automatiquement dans « Autres ».
    var CATS = [
      { title: 'Réflexion & logique', emoji: '🧠', keys: ['puissance4', 'reversi', 'dames', 'morpion', 'mastermind', 'sudoku', 'queens', 'tango', 'zip', 'patches', '2048', 'yams'] },
      { title: 'Cartes',              emoji: '🃏', keys: ['solitaire', 'balatro', 'blackjack', 'uno', 'skyjo', 'president', 'papayoo', 'trio', 'sixnimmt', 'millebornes', 'lapaye', 'nothanks'] },
      { title: 'Déduction & bluff',   emoji: '🕵️', keys: ['undercover', 'loupgarou', 'codenames', 'cluedo', 'juste-prix', 'bataille-navale', 'diamants', 'perudo'] },
      { title: 'Mots & dessin',       emoji: '✏️', keys: ['petit-bac', 'sutom', 'crack-list', 'pictionary', 'telephone-dessine'] },
      { title: 'Observation & ambiance', emoji: '⚡', keys: ['dobble-emoji', 'lynx', 'timesup', 'themind'] },
      { title: 'Gestion & réseau',    emoji: '🚦', keys: ['openfront', 'mini-metro', 'mini-motorways'] },
      { title: 'Plateau',             emoji: '🎲', keys: ['monopoly', 'ludo', 'blokus'] },
      // « Soirée & tournoi » volontairement en dernier (rangé tout en bas de l'accueil).
      { title: 'Soirée & tournoi',    emoji: '🎉', keys: ['soiree'] }
    ];
    var byKey = {}; GAMES.forEach(function (g) { byKey[g.key] = g; });

    // ── Favoris (⭐ épinglés en tête de grille, mémorisés sur l'appareil) ────
    var FAVS_KEY = 'games.favs';
    function getFavs() { try { return JSON.parse(localStorage.getItem(FAVS_KEY)) || []; } catch (e) { return []; } }
    function toggleFav(key) {
      var f = getFavs(), i = f.indexOf(key);
      if (i >= 0) f.splice(i, 1); else f.push(key);
      try { localStorage.setItem(FAVS_KEY, JSON.stringify(f)); } catch (e) {}
      buildGrid();
      if (window._searchApply) window._searchApply(); // garde le filtre de recherche actif
    }
    function cardHTML(g) {
      var cls = 'card' + (g.on ? '' : ' soon');
      var fav = getFavs().indexOf(g.key) >= 0;
      var inner = (g.offline ? '<span class="off-badge" title="Jouable hors-ligne (solo / local)">✈️</span>' : '') +
        '<button class="fav-btn' + (fav ? ' on' : '') + '" data-fav="' + g.key + '" title="' + (fav ? 'Retirer des favoris' : 'Ajouter aux favoris') + '" aria-label="Favori">' + (fav ? '★' : '☆') + '</button>' +
        '<div class="emoji">' + g.emoji + '</div><div class="name">' + g.name + '</div><div class="players">' + g.players + ' joueurs</div>' +
        (g.solo ? '<div class="solo-badge" title="Jouable seul contre l\'ordinateur">🤖 solo vs ordi</div>' : '');
      return g.on ? '<a class="' + cls + '" href="games/' + g.key + '.html">' + inner + '</a>'
                  : '<div class="' + cls + '">' + inner + '</div>';
    }
    function sectionHTML(title, emoji, list) {
      if (!list.length) return '';
      return '<h2 class="cat-title">' + emoji + ' ' + title + '</h2>' + list.map(cardHTML).join('');
    }
    var grid = document.getElementById('grid');
    function buildGrid() {
      var placed = {};
      var html = '';
      var favList = getFavs().map(function (k) { return byKey[k]; }).filter(Boolean);
      html += sectionHTML('Favoris', '⭐', favList);
      CATS.forEach(function (cat) {
        var list = cat.keys.map(function (k) { placed[k] = true; return byKey[k]; }).filter(Boolean);
        html += sectionHTML(cat.title, cat.emoji, list);
      });
      var others = GAMES.filter(function (g) { return !placed[g.key]; });
      html += sectionHTML('Autres', '🎯', others);
      grid.innerHTML = html;
    }
    buildGrid();
    // Clic sur l'étoile : on bascule le favori SANS suivre le lien de la carte.
    grid.addEventListener('click', function (e) {
      var b = e.target.closest('.fav-btn');
      if (!b) return;
      e.preventDefault(); e.stopPropagation();
      toggleFav(b.getAttribute('data-fav'));
    });

    // ── Recherche de jeu ──────────────────────────────────────────────────────
    // Filtre en direct les cartes par nom. Masque les titres de catégorie vides.
    (function setupSearch() {
      var search = document.getElementById('game-search');
      var clearBtn = document.getElementById('search-clear');
      var bar = document.getElementById('search-bar');
      var emptyMsg = document.getElementById('search-empty');
      var gridEl = document.getElementById('grid');
      if (!search || !gridEl) return;
      function norm(s) { return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
      function nameOf(el) { var n = el.querySelector('.name'); return norm(n ? n.textContent : ''); }
      function apply() {
        var q = norm(search.value.trim());
        bar.classList.toggle('has-value', !!search.value);
        var anyVisible = false;
        // Grille principale : parcours en gardant le titre de catégorie courant.
        var currentTitle = null, groupHasVisible = false;
        function closeGroup() { if (currentTitle) currentTitle.style.display = groupHasVisible ? '' : 'none'; }
        Array.prototype.forEach.call(gridEl.children, function (el) {
          if (el.classList.contains('cat-title')) { closeGroup(); currentTitle = el; groupHasVisible = false; return; }
          var show = !q || nameOf(el).indexOf(q) !== -1;
          el.style.display = show ? '' : 'none';
          if (show) { groupHasVisible = true; anyVisible = true; }
        });
        closeGroup();
        emptyMsg.style.display = (q && !anyVisible) ? 'block' : 'none';
      }
      search.addEventListener('input', apply);
      if (clearBtn) clearBtn.addEventListener('click', function () { search.value = ''; apply(); search.focus(); });
      window._searchApply = apply; // ré-appliqué après un re-rendu de la grille (favoris)
    })();

    var input = document.getElementById('join-code');
    input.addEventListener('input', function () { input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); });
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') joinByCode(); });

    function toast(m) { var t = document.getElementById('lb-toast'); t.textContent = m; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(function () { t.classList.remove('show'); }, 2200); }

    // Les règles strictes exigent une session authentifiée : on attend l'uid (auth
    // anonyme) avant toute lecture/écriture de la base. Repli immédiat si l'auth est
    // désactivée (règles permissives) ou déjà prête.
    function whenReady(cb) {
      if (window.GAMES_UID) return cb();
      if (window.GAMES_USE_AUTH && window.whenGamesAuth) return window.whenGamesAuth(cb);
      cb();
    }

    function joinByCode() {
      var code = (input.value || '').trim().toUpperCase();
      if (code.length < 5) { toast('Entre les 5 caractères du code'); return; }
      whenReady(function () {
        firebase.database().ref((window.GAMES_ROOT || 'games') + '/rooms/' + code).once('value').then(function (snap) {
          var room = snap.val();
          if (!room || !room.game) { toast('Salon introuvable'); return; }
          location.href = '/games/' + room.game + '.html?room=' + code;
        }).catch(function () { toast('Connexion impossible'); });
      });
    }

    // Nettoyage best-effort des vieux salons abandonnés (> 12 h). Borné à 20
    // suppressions par visite. Nécessite l'index « createdAt » côté règles et une
    // session authentifiée (le remove() est refusé sans auth sous règles strictes).
    whenReady(function sweepOldRooms() {
      try {
        var maxAge = 12 * 60 * 60 * 1000;
        firebase.database().ref((window.GAMES_ROOT || 'games') + '/rooms')
          .orderByChild('createdAt').endAt(Date.now() - maxAge).limitToFirst(20)
          .once('value', function (snap) {
            snap.forEach(function (child) {
              var v = child.val() || {};
              // partie encore EN COURS (soirée marathon) → épargnée jusqu'à 48 h
              if (v.status === 'playing' && (v.createdAt || 0) > Date.now() - 48 * 60 * 60 * 1000) return;
              try { child.ref.remove(); } catch (e) {}
            });
          });
      } catch (e) {}
    });
  </script>

  <script>
    // ── Indicateur « Prêt pour l'avion » ──────────────────────────────────────
    // Dialogue avec le service worker (sw.js) pour savoir si toutes les pages/
    // scripts/polices sont en cache, et propose de forcer le préchargement.
    (function planeCheck() {
      var box = document.getElementById('plane-check');
      var icon = document.getElementById('pc-icon'), title = document.getElementById('pc-title');
      var sub = document.getElementById('pc-sub'), btn = document.getElementById('pc-btn');
      if (!('serviceWorker' in navigator)) return; // navigateur sans hors-ligne → on n'affiche rien

      // Envoie un message au SW actif et attend sa réponse (canal dédié).
      function ask(type) {
        return navigator.serviceWorker.ready.then(function (reg) {
          var w = reg.active || navigator.serviceWorker.controller;
          if (!w) return null;
          return new Promise(function (res) {
            var ch = new MessageChannel();
            var done = false;
            ch.port1.onmessage = function (ev) { done = true; res(ev.data); };
            setTimeout(function () { if (!done) res(null); }, 8000);
            w.postMessage({ type: type }, [ch.port2]);
          });
        }).catch(function () { return null; });
      }

      function render(s) {
        box.hidden = false;
        if (!s) { icon.textContent = '✈️'; title.textContent = 'Mode hors-ligne'; sub.textContent = 'Statut indisponible — recharge la page une fois en ligne.'; btn.hidden = true; return; }
        if (s.ready) {
          box.classList.add('ready'); icon.textContent = '✅';
          title.textContent = 'Prêt pour l\'avion';
          sub.textContent = s.games + ' jeux + polices en cache — jouable sans réseau.';
          btn.hidden = true;
        } else {
          box.classList.remove('ready'); icon.textContent = '✈️';
          title.textContent = 'Préparer le mode hors-ligne';
          sub.textContent = 'En cache : ' + s.cached + '/' + s.total + ' fichiers. Fais-le tant que tu as du réseau.';
          btn.hidden = false; btn.disabled = false; btn.textContent = 'Préparer';
        }
      }

      window.preparePlane = function () {
        btn.disabled = true; btn.textContent = 'Préchargement…';
        title.textContent = 'Téléchargement en cours…'; sub.textContent = 'Garde la page ouverte quelques secondes.';
        ask('PRECACHE').then(render);
      };

      ask('CACHE_STATUS').then(render);
    })();
  </script>
