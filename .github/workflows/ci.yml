name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Vérifs (syntaxe JS + cohérence index/sw + JSON)
        run: node tools/check.js
      - name: README à jour avec le catalogue index.html
        run: node tools/gen-readme.js --check
      - name: Banc d'essai des IA (taux de victoire attendus)
        run: node tools/bench.js
