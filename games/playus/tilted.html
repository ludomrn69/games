<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Tilted · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#5aa0d6,#2a6ba0);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#e6f2ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#c8e0f5}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#e6f2ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(20,50,80,.8);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e6f2ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ffb020,#ff7a3d);box-shadow:0 8px 24px rgba(255,122,61,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour à l'accueil">‹</a><span class="score" id="score">0.0s</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Touche le côté opposé à la chute de la bille</div>
    <div class="screen" id="start"><h1>⚖️ Tilted</h1><p>La planche bascule. Tape du côté opposé pour la redresser et garde la bille au centre le plus longtemps possible&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Tombée&nbsp;!</h1><div class="big" id="finalScore">0.0s</div><p id="overMsg">équilibre tenu</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_tilted_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best.toFixed(1)+'s':'';}showBest();
  var state,angle,angVel,ballPos,ballVel,t0,beamLen;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function start(){resize();angle=0;angVel=0;ballPos=0;ballVel=0;t0=performance.now();beamLen=Math.min(W*0.8,360);
    state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';var t=(performance.now()-t0)/1000;document.getElementById('finalScore').textContent=t.toFixed(1)+'s';
    if(t>best){best=t;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='🏆 Record !';}
    else document.getElementById('overMsg').textContent='équilibre tenu';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(e){if(state!=='play')return;var rect=cv.getBoundingClientRect();
    var left=(e.clientX-rect.left)<W/2;angVel+=left?0.010:-0.010;vibrate(5);});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);var cx=W/2,cy=H*0.5;
    if(state==='play'){
      // la bille sur la planche subit la gravité le long de la pente
      ballVel+=Math.sin(angle)*0.9;ballVel*=0.995;ballPos+=ballVel;
      // le déséquilibre de la bille fait pencher la planche
      angVel+=ballPos*0.0000045;angVel*=0.985;angle+=angVel;
      if(Math.abs(ballPos)>beamLen/2||Math.abs(angle)>0.6)end();
      scoreEl.textContent=((performance.now()-t0)/1000).toFixed(1)+'s';
    }
    // pivot
    ctx.fillStyle='#7a1f1f';ctx.beginPath();ctx.moveTo(cx-24,cy+60);ctx.lineTo(cx+24,cy+60);ctx.lineTo(cx,cy);ctx.fill();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
    ctx.fillStyle='#ffb020';ctx.fillRect(-beamLen/2,-10,beamLen,16);
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(-2,-16,4,10);// repère centre
    var bx=ballPos,r=Math.max(14,W*0.04);
    if(isFinite(bx)){ // pas de bille avant la 1re partie
      ctx.beginPath();ctx.arc(bx,-10-r,r,0,7);
      var grd=ctx.createRadialGradient(bx-4,-14-r,3,bx,-10-r,r);grd.addColorStop(0,'#fff');grd.addColorStop(1,'#e8524a');ctx.fillStyle=grd;ctx.fill();
    }
    ctx.restore();
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
