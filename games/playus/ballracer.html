<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Ballracer · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#3a1a6c,#7a3fd6);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#e0d8ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#c5b8f5}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#e0d8ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(30,14,70,.82);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e0d8ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ffb020,#ff7a3d);box-shadow:0 8px 24px rgba(255,122,61,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Touche gauche / droite pour diriger la bille</div>
    <div class="screen" id="start"><h1>🟡 Ballracer</h1><p>La piste accélère&nbsp;! Dirige la bille à gauche ou à droite pour éviter les obstacles.</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Crash&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">distance</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_ballracer_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  // 3 couloirs, obstacles descendent, bille en bas.
  var state,score,lane,obs=[],speed,acc,dist,dir;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function laneX(l){return W*(0.25+l*0.25);}
  function start(){resize();score=0;lane=1;obs=[];speed=Math.max(4,H*0.007);acc=0;dist=0;dir=0;
    scoreEl.textContent='0';state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='distance';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(e){if(state!=='play')return;var rect=cv.getBoundingClientRect();
    if(e.clientX-rect.left<W/2)lane=Math.max(0,lane-1);else lane=Math.min(2,lane+1);vibrate(6);});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  var spawnAcc=0;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);var by=H-70,r=Math.max(15,W*0.045);
    // route
    ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(W*0.14,0,W*0.72,H);
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=3;ctx.setLineDash([18,18]);
    [0.5].forEach(function(){});for(var l=1;l<3;l++){ctx.beginPath();ctx.moveTo(W*(0.14+l*0.24),0);ctx.lineTo(W*(0.14+l*0.24),H);ctx.stroke();}
    ctx.setLineDash([]);
    if(state==='play'){speed+=0.0016;dist+=speed;spawnAcc+=speed;
      if(spawnAcc>Math.max(120,220-score*2)){spawnAcc=0;var l=Math.floor(Math.random()*3);obs.push({l:l,y:-40});}
      obs.forEach(function(o){o.y+=speed;});
      obs=obs.filter(function(o){
        if(o.y>H+40){score++;scoreEl.textContent=score;return false;}
        if(Math.abs(o.y-by)<r+20&&o.l===lane){end();return false;}
        return true;});
    }
    // obstacles
    obs.forEach(function(o){ctx.fillStyle='#e8524a';var ox=laneX(o.l);ctx.fillRect(ox-24,o.y-18,48,36);
      ctx.fillStyle='#a51f1f';ctx.fillRect(ox-24,o.y-18,48,6);});
    // bille
    var bx=laneX(lane);ctx.beginPath();ctx.arc(bx,by,r,0,7);
    var grd=ctx.createRadialGradient(bx-r*0.3,by-r*0.3,r*0.2,bx,by,r);grd.addColorStop(0,'#fff');grd.addColorStop(1,'#ffb020');
    ctx.fillStyle=grd;ctx.fill();
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
