<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Speed Tap · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 20%,#6a1f6a,#1e0820 75%);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#f0b0e6;text-decoration:none;font-size:1.4rem}.score{font-size:1.6rem}.timer{font-size:1.2rem;color:#ffd45e}
  #stage{flex:1;width:100%;max-width:520px;position:relative;display:flex;align-items:center;justify-content:center;padding:20px}
  #btnBig{width:min(78vw,320px);height:min(78vw,320px);border-radius:50%;border:none;color:#fff;font-size:2rem;font-weight:900;cursor:pointer;
    background:radial-gradient(circle at 40% 35%,#ff7ad6,#c94bd6 55%,#7a1f9a);box-shadow:0 12px 34px rgba(201,75,214,.5);font-family:inherit}
  #btnBig:active{transform:scale(.96)}
  #cps{position:absolute;bottom:24px;left:0;right:0;text-align:center;color:#f0b0e6;font-weight:700}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(20,6,26,.85);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#f0b0e6;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#c94bd6,#ff7a3d);box-shadow:0 8px 24px rgba(201,75,214,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="timer" id="timer">10.0</span></div>
  <div id="stage">
    <button id="btnBig">TAPE&nbsp;!</button>
    <div id="cps"></div>
    <div class="screen" id="start"><h1>👆 Speed Tap</h1><p>Tape le bouton le plus de fois possible en <b>10&nbsp;secondes</b>. Le chrono démarre au premier tap&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Fini&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">taps</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var btn=document.getElementById('btnBig'),cps=document.getElementById('cps');
  var scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var BEST='playus_speedtap_best',best=+localStorage.getItem(BEST)||0;
  var state,score,t0,raf,DUR=10000;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function arm(){score=0;scoreEl.textContent='0';timerEl.textContent='10.0';cps.textContent='';t0=null;
    state='armed';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';cancelAnimationFrame(raf);timerEl.textContent='0.0';
    document.getElementById('finalScore').textContent=score;
    cps.textContent=(score/(DUR/1000)).toFixed(1)+' taps/s';
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆 · '+cps.textContent;}
    else document.getElementById('overMsg').textContent='taps · '+cps.textContent;
    overScr.classList.remove('hidden');vibrate([30,40,80]);
  }
  function loop(){raf=requestAnimationFrame(loop);var left=Math.max(0,DUR-(performance.now()-t0));
    timerEl.textContent=(left/1000).toFixed(1);if(left<=0)end();}
  btn.addEventListener('pointerdown',function(){
    if(state==='armed'){state='play';t0=performance.now();raf=requestAnimationFrame(loop);}
    if(state==='play'){score++;scoreEl.textContent=score;vibrate(4);}
  });
  document.getElementById('startBtn').onclick=arm;document.getElementById('replayBtn').onclick=arm;
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
