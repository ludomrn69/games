<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Jumpy · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:#3a9a4a;display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#e0ffe0;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#c8f0c8}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#fff;font-weight:700;font-size:.9rem;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.35)}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(15,50,25,.85);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e0ffe0;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3fb562,#7ac94b);box-shadow:0 8px 24px rgba(63,181,98,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Tape pour sauter en avant · glisse pour aller sur le côté</div>
    <div class="screen" id="start"><h1>🐸 Jumpy</h1><p>Traverse la route en sautant entre les voitures. Va le plus loin possible sans te faire écraser&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Écrasé&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">cases traversées</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_jumpy_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  // Grille de colonnes. La grenouille avance rangée par rangée (world row).
  // Rangées : herbe (safe) ou route (voitures qui défilent). Caméra suit la grenouille.
  var CARCOL=['#e8524a','#4a7de8','#ffb020','#c94bd6','#4ec97a'];
  var state,cols,cell,rows,frogRow,frogCol,maxRow,animY;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function mkRow(r){if(r<=0||Math.random()<0.32)return {road:false,cars:[]};
    var speed=(0.6+Math.random()*1.6)*(Math.random()<0.5?1:-1)*(1+r*0.012);
    var cars=[],n=1+Math.floor(Math.random()*2),gap=cols/n;
    for(var i=0;i<n;i++)cars.push({x:i*gap+Math.random()*gap*0.5,len:1,c:CARCOL[Math.floor(Math.random()*CARCOL.length)]});
    return {road:true,cars:cars,speed:speed};}
  function ensureRows(upTo){while(rows.length<=upTo)rows.push(mkRow(rows.length));}
  function start(){resize();cols=7;cell=Math.min(W/cols,H/9);rows=[];frogRow=0;frogCol=(cols/2)|0;maxRow=0;animY=0;
    ensureRows(20);state='play';scoreEl.textContent='0';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';document.getElementById('finalScore').textContent=maxRow;
    if(maxRow>best){best=maxRow;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='cases traversées';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  function hop(dc,dr){if(state!=='play')return;var nc=frogCol+dc,nr=frogRow+dr;
    if(nc<0||nc>=cols)return;if(nr<0)nr=0;frogCol=nc;frogRow=nr;ensureRows(frogRow+20);
    if(frogRow>maxRow){maxRow=frogRow;scoreEl.textContent=maxRow;}animY=1;vibrate(5);}
  var sx,sy,moved;
  stage.addEventListener('pointerdown',function(e){sx=e.clientX;sy=e.clientY;moved=false;});
  stage.addEventListener('pointermove',function(e){if(sx==null)return;if(Math.abs(e.clientX-sx)>20||Math.abs(e.clientY-sy)>20)moved=moved;});
  stage.addEventListener('pointerup',function(e){if(state!=='play'||sx==null)return;var dx=e.clientX-sx,dy=e.clientY-sy;
    if(Math.abs(dx)<24&&Math.abs(dy)<24){hop(0,1);} // tap = avance
    else if(Math.abs(dx)>Math.abs(dy)){hop(dx>0?1:-1,0);}
    else hop(0,dy<0?1:-1);sx=null;});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);
    cell=Math.min(W/cols,H/9);var ox=(W-cols*cell)/2;
    var camRow=frogRow; // grenouille placée à ~70% de la hauteur
    var baseY=H*0.68;
    if(state==='play'){if(animY>0)animY-=0.15;
      rows.forEach(function(row,r){if(row.road){row.cars.forEach(function(car){car.x+=row.speed*0.03;
        if(car.x>cols+1)car.x=-1;if(car.x<-1)car.x=cols+1;});}});
      // collision
      var row=rows[frogRow];if(row&&row.road){for(var i=0;i<row.cars.length;i++){var car=row.cars[i];
        if(frogCol+0.5>car.x&&frogCol+0.5<car.x+car.len)end();}}
    }
    function rowY(r){return baseY-(r-camRow)*cell;}
    for(var r=frogRow-2;r<frogRow+9;r++){if(r<0)continue;var row=rows[r];if(!row)continue;var y=rowY(r);
      ctx.fillStyle=row.road?'#3a3f4a':((r%2)?'#3a9a4a':'#43a653');ctx.fillRect(0,y-cell,W,cell);
      if(row.road){ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;ctx.setLineDash([10,10]);
        ctx.beginPath();ctx.moveTo(0,y-cell/2);ctx.lineTo(W,y-cell/2);ctx.stroke();ctx.setLineDash([]);
        row.cars.forEach(function(car){var cx=ox+car.x*cell,cw=cell*0.86;ctx.fillStyle=car.c;
          ctx.fillRect(cx,y-cell+cell*0.12,cw,cell*0.76);ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(cx,y-cell+cell*0.12,cw,cell*0.16);});}
    }
    // grenouille
    var fx=ox+frogCol*cell+cell/2,fy=rowY(frogRow)-cell/2-animY*cell*0.4;
    ctx.font=(cell*0.7)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🐸',fx,fy);
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
