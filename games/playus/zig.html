<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Zig · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#6a4fd6,#2a1a6c);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#ddd4ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#c5b8f5}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#ddd4ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(25,15,70,.8);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#ddd4ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ffb020,#ff7a3d);box-shadow:0 8px 24px rgba(255,122,61,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour à l'accueil">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Tape pour changer de direction</div>
    <div class="screen" id="start"><h1>⚡ Zig</h1><p>La bille avance toute seule en diagonale. Tape pour tourner à 90° et rester sur le chemin&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Dans le vide&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">distance</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_zig_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  // La bille se déplace en diagonale ; le monde défile en bas-gauche. Le chemin est
  // une suite de segments qui zigzaguent. On garde la bille dessus.
  var state,score,dir,path=[],camX,camY,speed,ballWX=0,ballWY=0,tileW;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function extendPath(){var last=path[path.length-1];var nd=Math.random()<0.5?1:-1;
    // ajoute quelques tuiles dans la direction courante puis tourne
    for(var i=0;i<2+Math.floor(Math.random()*3);i++){last={x:last.x+(last.dir>0?1:0),y:last.y+(last.dir>0?0:1),dir:last.dir};path.push(last);}
    last={x:last.x,y:last.y,dir:-last.dir};path.push(last);
  }
  var baseSpeed;
  function start(){resize();score=0;tileW=Math.max(30,W*0.10);baseSpeed=Math.max(1.4,W*0.004);speed=baseSpeed;dir=1;
    path=[{x:0,y:0,dir:1}];for(var i=0;i<40;i++)extendPath();
    ballWX=0.5;ballWY=0.5;state='play';scoreEl.textContent='0';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='distance';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(){if(state==='play'){dir=-dir;vibrate(6);}});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function onPath(){ // la bille (ballWX,ballWY) est-elle sur une tuile ?
    var bx=Math.floor(ballWX),by=Math.floor(ballWY);
    return path.some(function(t){return t.x===bx&&t.y===by;});
  }
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);
    if(state==='play'){
      // Accélération progressive : +80 % de vitesse sur les 60 premiers points, puis ça continue de grimper doucement.
      speed=baseSpeed*(1+Math.min(score,60)*0.013+Math.max(0,score-60)*0.004);
      if(dir>0)ballWX+=speed/tileW;else ballWY+=speed/tileW;
      var s=Math.floor(ballWX)+Math.floor(ballWY);if(s>score){score=s;scoreEl.textContent=score;if(window.Sfx&&s%5===0)try{Sfx.play('coin');}catch(e){}}
      if(!onPath())end();
      if(path.length-Math.floor(ballWX)-Math.floor(ballWY)<25)for(var k=0;k<10;k++)extendPath();
    }
    // caméra centrée sur la bille (projection isométrique simple)
    var cx=W/2,cy=H*0.6;
    function proj(wx,wy){return {x:cx+(wx-ballWX)*tileW*0.7-(wy-ballWY)*tileW*0.7,y:cy+(wx-ballWX)*tileW*0.4+(wy-ballWY)*tileW*0.4};}
    path.forEach(function(t){var p=proj(t.x,t.y);if(p.y<-tileW||p.y>H+tileW)return;
      ctx.save();ctx.translate(p.x,p.y);ctx.beginPath();ctx.moveTo(0,-tileW*0.4);ctx.lineTo(tileW*0.7,0);ctx.lineTo(0,tileW*0.4);ctx.lineTo(-tileW*0.7,0);ctx.closePath();
      ctx.fillStyle='#ffb020';ctx.fill();ctx.fillStyle='rgba(0,0,0,.12)';ctx.fillRect(-tileW*0.7,0,tileW*1.4,tileW*0.4);ctx.restore();});
    var bp=proj(ballWX,ballWY);ctx.beginPath();ctx.arc(bp.x,bp.y-10,Math.max(9,tileW*0.28),0,7);
    var grd=ctx.createRadialGradient(bp.x-4,bp.y-14,3,bp.x,bp.y-10,tileW*0.28);grd.addColorStop(0,'#fff');grd.addColorStop(1,'#e8524a');ctx.fillStyle=grd;ctx.fill();
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
