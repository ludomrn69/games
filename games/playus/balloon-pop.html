<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Balloon Pop · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#87ceeb,#4a90c4 70%,#2d6a9a);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#fff;text-decoration:none;font-size:1.4rem}.score{font-size:1.6rem}.timer{font-size:1.2rem;color:#ffd45e}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(20,50,80,.8);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#e6f2ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#e8524a,#ff7a3d);box-shadow:0 8px 24px rgba(232,82,74,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="timer" id="timer">30</span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="screen" id="start"><h1>🎈 Balloon Pop</h1><p>Éclate tous les ballons qui montent avant qu'ils ne s'échappent en haut&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1 id="overTitle">Temps écoulé&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">ballons éclatés</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_balloonpop_best',best=+localStorage.getItem(BEST)||0;
  var PAL=['#e8524a','#ffb020','#4ec97a','#c94bd6','#4bc9c0','#ff7ad6'];
  var state,score,missed,timeLeft,tickT,balloons=[],spawnAcc,lastTs,pops=[];
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function start(){resize();score=0;missed=0;timeLeft=30;balloons=[];pops=[];spawnAcc=0;lastTs=performance.now();
    scoreEl.textContent='0';timerEl.textContent='30';state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');
    clearInterval(tickT);tickT=setInterval(function(){timeLeft--;timerEl.textContent=timeLeft;if(timeLeft<=0)end();},1000);
    requestAnimationFrame(loop);}
  function end(){state='over';clearInterval(tickT);document.getElementById('finalScore').textContent=score;
    document.getElementById('overMsg').textContent=missed?'ballons éclatés · '+missed+' ratés':'ballons éclatés — sans faute !';
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overTitle').textContent='Bravo !';document.getElementById('overMsg').textContent='🏆 Record ! '+score+' ballons';}
    overScr.classList.remove('hidden');vibrate([30,40,80]);}
  function spawn(){var r=Math.max(28,W*0.08);balloons.push({x:r+Math.random()*(W-2*r),y:H+r,r:r,
    vy:-(Math.max(1.6,H*0.0028)*(0.7+Math.random()*1.2))-score*0.01,c:PAL[Math.floor(Math.random()*PAL.length)],sway:Math.random()*6});}
  function at(e){var rect=cv.getBoundingClientRect();return {x:e.clientX-rect.left,y:e.clientY-rect.top};}
  stage.addEventListener('pointerdown',function(e){if(state!=='play')return;var p=at(e);
    for(var i=balloons.length-1;i>=0;i--){var b=balloons[i];if((b.x-p.x)*(b.x-p.x)+(b.y-p.y)*(b.y-p.y)<b.r*b.r){
      pops.push({x:b.x,y:b.y,r:b.r,c:b.c,t:0});balloons.splice(i,1);score++;scoreEl.textContent=score;vibrate(10);return;}}
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function loop(ts){requestAnimationFrame(loop);var dt=Math.min(40,ts-lastTs);lastTs=ts;ctx.clearRect(0,0,W,H);
    if(state==='play'){spawnAcc+=dt;if(spawnAcc>Math.max(420,900-score*8)){spawnAcc=0;spawn();}
      for(var i=balloons.length-1;i>=0;i--){var b=balloons[i];b.y+=b.vy;b.sway+=0.05;b.x+=Math.sin(b.sway)*0.6;
        if(b.y+b.r<0){balloons.splice(i,1);missed++;vibrate(15);}}
    }
    balloons.forEach(function(b){ctx.beginPath();ctx.ellipse(b.x,b.y,b.r*0.82,b.r,0,0,7);ctx.fillStyle=b.c;ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.ellipse(b.x-b.r*0.3,b.y-b.r*0.35,b.r*0.18,b.r*0.28,0,0,7);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(b.x,b.y+b.r);ctx.lineTo(b.x,b.y+b.r+16);ctx.stroke();});
    for(var j=pops.length-1;j>=0;j--){var p=pops[j];p.t+=0.12;ctx.globalAlpha=Math.max(0,1-p.t);ctx.strokeStyle=p.c;ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1+p.t),0,7);ctx.stroke();ctx.globalAlpha=1;if(p.t>=1)pops.splice(j,1);}
  }
  resize();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
