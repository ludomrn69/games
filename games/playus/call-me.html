<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Call me · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 20%,#e07a1f,#3a1a08 75%);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#ffd7a8;text-decoration:none;font-size:1.4rem}.score{font-size:1.4rem}.timer{font-size:1.2rem;color:#ffd45e}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(30,14,4,.85);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#ffd7a8;max-width:280px;line-height:1.4}
  .big{font-size:3rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ffb020,#ff7a3d);box-shadow:0 8px 24px rgba(255,122,61,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">Niv. 1</span><span class="timer" id="timer">0.0</span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="screen" id="start"><h1>🔗 Call me</h1><p>Relie les cercles numérotés dans l'ordre, en un seul geste, sans lever le doigt&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1 id="overTitle">Fini&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">niveaux</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_callme_best',best=+localStorage.getItem(BEST)||0;
  var state='idle',level,nodes=[],next=0,drawing,px,py,t0,raf;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function build(){nodes=[];var n=Math.min(12,4+level);var tries=0;
    while(nodes.length<n&&tries<800){tries++;var x=50+Math.random()*(W-100),y=90+Math.random()*(H-160);
      if(nodes.every(function(p){return (p.x-x)*(p.x-x)+(p.y-y)*(p.y-y)>90*90;}))nodes.push({x:x,y:y});}
    nodes.forEach(function(p,i){p.n=i+1;p.done=false;});next=1;}
  function start(){resize();level=1;t0=performance.now();build();state='play';scoreEl.textContent='Niv. 1';
    startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function loop(){requestAnimationFrame(loop);if(state==='play')timerEl.textContent=((performance.now()-t0)/1000).toFixed(1);draw();}
  function win(){state='over';cancelAnimationFrame(raf);var t=(performance.now()-t0)/1000;
    document.getElementById('overTitle').textContent='Bravo !';document.getElementById('finalScore').textContent='Niv. '+level;
    if(level>best){best=level;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='🏆 Record ! '+t.toFixed(1)+'s';}
    else document.getElementById('overMsg').textContent='niveaux · '+t.toFixed(1)+'s';
    overScr.classList.remove('hidden');vibrate([15,25,15]);
  }
  function nextLevel(){level++;scoreEl.textContent='Niv. '+level;build();vibrate([10,20,10]);}
  function at(e){var rect=cv.getBoundingClientRect();return {x:e.clientX-rect.left,y:e.clientY-rect.top};}
  function tryHit(p){nodes.forEach(function(nd){if(!nd.done&&(nd.x-p.x)*(nd.x-p.x)+(nd.y-p.y)*(nd.y-p.y)<34*34){
    if(nd.n===next){nd.done=true;next++;vibrate(6);if(next>nodes.length){if(level>=8)win();else nextLevel();}}
  }});}
  stage.addEventListener('pointerdown',function(e){if(state!=='play')return;drawing=true;var p=at(e);px=p.x;py=p.y;tryHit(p);});
  stage.addEventListener('pointermove',function(e){if(!drawing||state!=='play')return;var p=at(e);px=p.x;py=p.y;tryHit(p);});
  stage.addEventListener('pointerup',function(){drawing=false;});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function draw(){ctx.clearRect(0,0,W,H);
    // segments faits
    ctx.strokeStyle='#ffd45e';ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();
    var done=nodes.filter(function(n){return n.done;}).sort(function(a,b){return a.n-b.n;});
    done.forEach(function(n,i){if(i===0)ctx.moveTo(n.x,n.y);else ctx.lineTo(n.x,n.y);});
    if(done.length&&drawing){ctx.lineTo(px,py);}ctx.stroke();
    nodes.forEach(function(n){ctx.beginPath();ctx.arc(n.x,n.y,26,0,7);
      ctx.fillStyle=n.done?'#3fb562':(n.n===next?'#fff':'#c94b9e');ctx.fill();
      ctx.fillStyle=n.n===next&&!n.done?'#c94b9e':'#fff';ctx.font='bold 20px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n.n,n.x,n.y);});
  }
  resize();loop();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
