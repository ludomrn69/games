<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Kenneys Race · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:#2b7a3a;display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#d8ffd8;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.timer{font-size:1.2rem;color:#ffd45e}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .ctrls{position:absolute;bottom:24px;left:0;right:0;display:flex;justify-content:space-between;padding:0 24px}
  .ctrls button{width:88px;height:88px;border-radius:50%;border:none;font-size:2rem;color:#fff;background:rgba(0,0,0,.35);cursor:pointer}
  .ctrls button:active{background:rgba(0,0,0,.55)}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(15,50,25,.85);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#d8ffd8;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ffb020,#ff7a3d);box-shadow:0 8px 24px rgba(255,122,61,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="timer" id="timer">40</span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="ctrls"><button id="left">◀</button><button id="right">▶</button></div>
    <div class="screen" id="start"><h1>🏁 Kenneys Race</h1><p>Fonce vers les portes 🚩 pour marquer un maximum de checkpoints avant la fin du chrono&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Temps écoulé&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">checkpoints</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_kenneysrace_best',best=+localStorage.getItem(BEST)||0;
  // Voiture avec position + cap. Elle avance toujours. Portes réparties dans un
  // grand monde ; caméra suit la voiture. Toucher une porte = +1 & nouvelle porte.
  var state,score,carX=0,carY=0,heading,steer,timeLeft,tickT,gate={x:0,y:0},speed;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function newGate(){gate={x:carX+(Math.random()-0.5)*W*1.6,y:carY+(Math.random()-0.5)*H*1.6};}
  function start(){resize();score=0;carX=0;carY=0;heading=0;steer=0;speed=Math.max(3.2,H*0.006);timeLeft=40;
    newGate();state='play';scoreEl.textContent='0';timerEl.textContent='40';startScr.classList.add('hidden');overScr.classList.add('hidden');
    clearInterval(tickT);tickT=setInterval(function(){timeLeft--;timerEl.textContent=timeLeft;if(timeLeft<=0)end();},1000);}
  function end(){state='over';clearInterval(tickT);document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='checkpoints';overScr.classList.remove('hidden');vibrate([30,40,80]);}
  var L=document.getElementById('left'),R=document.getElementById('right');
  function hold(btn,val){btn.addEventListener('pointerdown',function(e){e.preventDefault();steer=val;});
    btn.addEventListener('pointerup',function(){steer=0;});btn.addEventListener('pointerleave',function(){steer=0;});btn.addEventListener('pointercancel',function(){steer=0;});}
  hold(L,-1);hold(R,1);
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);var cx=W/2,cy=H*0.55;
    if(state==='play'){heading+=steer*0.055;carX+=Math.sin(heading)*speed;carY-=Math.cos(heading)*speed;
      var dx=gate.x-carX,dy=gate.y-carY;if(dx*dx+dy*dy<40*40){score++;scoreEl.textContent=score;timeLeft=Math.min(60,timeLeft+2);vibrate(10);newGate();}
    }
    // herbe damier (repère de déplacement)
    var gs=80;ctx.save();
    for(var gx=-1;gx<W/gs+2;gx++)for(var gy=-1;gy<H/gs+2;gy++){
      var wx=Math.floor((carX)/gs)+gx,wy=Math.floor((carY)/gs)+gy;
      var sx=cx+(wx*gs-carX),sy=cy+(wy*gs-carY);
      ctx.fillStyle=((wx+wy)&1)?'#2b7a3a':'#31883f';ctx.fillRect(sx,sy,gs,gs);
    }ctx.restore();
    // porte
    var gsx=cx+(gate.x-carX),gsy=cy+(gate.y-carY);
    ctx.font='40px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🚩',gsx,gsy);
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(gsx,gsy,34,0,7);ctx.stroke();
    // voiture
    ctx.save();ctx.translate(cx,cy);ctx.rotate(heading);
    ctx.fillStyle='#ffd45e';ctx.fillRect(-14,-24,28,48);ctx.fillStyle='#c98a10';ctx.fillRect(-14,-24,28,10);
    ctx.fillStyle='#222';ctx.fillRect(-18,-18,5,12);ctx.fillRect(13,-18,5,12);ctx.fillRect(-18,8,5,12);ctx.fillRect(13,8,5,12);ctx.restore();
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
