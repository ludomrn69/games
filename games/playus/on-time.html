<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>On Time! · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 28%,#3a1414,#160808 70%);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#f0a9a9;text-decoration:none;font-size:1.4rem}.score{font-size:1.5rem}.lives{font-size:1.2rem}
  #stage{flex:1;width:100%;max-width:520px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:20px}
  .target{font-size:1.1rem;color:#f0a9a9;font-weight:700}
  .target b{font-size:2.6rem;color:#fff;display:block;margin-top:4px}
  #tapzone{width:min(80vw,340px);height:min(80vw,340px);border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#e8524a,#a51f1f);box-shadow:0 14px 40px rgba(0,0,0,.5);font-size:1.4rem;font-weight:800;text-align:center;padding:20px}
  #tapzone.running{background:linear-gradient(160deg,#3fb562,#1f7a3a)}
  #tapzone:active{transform:scale(.98)}
  .result{font-size:1.3rem;font-weight:800;min-height:1.5em}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(22,8,8,.85);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#f0a9a9;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#e8524a,#c94b9e);box-shadow:0 8px 24px rgba(232,82,74,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="lives" id="lives">❤️❤️❤️</span></div>
  <div id="stage">
    <div class="target">Arrête-toi à <b id="targetT">5.000s</b></div>
    <div id="tapzone">Tape pour lancer</div>
    <div class="result" id="result"></div>
    <div class="screen" id="start">
      <h1>⏱️ On Time!</h1>
      <p>Un chrono invisible démarre. Tape pile au temps demandé. Plus tu es précis, plus tu marques&nbsp;!</p>
      <button class="btn" id="startBtn">Jouer</button>
    </div>
    <div class="screen hidden" id="over">
      <h1>Fini&nbsp;!</h1>
      <div class="big" id="finalScore">0</div>
      <p id="overMsg">points de précision</p>
      <button class="btn" id="replayBtn">Rejouer</button>
    </div>
  </div>
<script>
(function(){
  var tap=document.getElementById('tapzone'),targetT=document.getElementById('targetT'),result=document.getElementById('result');
  var scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var BEST_KEY='playus_ontime_best';var best=+localStorage.getItem(BEST_KEY)||0;
  var state,score,lives,phase,t0,targetMs,tol;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function newRound(){
    phase='ready';targetMs=Math.round((2500+Math.random()*4000));tol=Math.max(120,420-score*4);
    targetT.textContent=(targetMs/1000).toFixed(3)+'s';
    tap.textContent='Tape pour lancer';tap.classList.remove('running');result.textContent='';
  }
  function start(){score=0;lives=3;scoreEl.textContent='0';livesEl.textContent='❤️❤️❤️';
    state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');newRound();}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST_KEY,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='points de précision';
    overScr.classList.remove('hidden');vibrate([40,60,120]);}
  tap.addEventListener('pointerdown',function(){
    if(state!=='play')return;
    if(phase==='ready'){phase='running';t0=performance.now();tap.textContent='STOP !';tap.classList.add('running');vibrate(10);return;}
    if(phase==='running'){
      var err=Math.abs(performance.now()-t0-targetMs);
      tap.classList.remove('running');tap.textContent='Tape pour lancer';
      if(err<=tol){var pts=Math.max(5,Math.round((tol-err)/tol*100));score+=pts;scoreEl.textContent=score;
        result.style.color='#7ac94b';result.textContent='+'+pts+'  ('+(err/1000).toFixed(3)+'s d\'écart)';vibrate(err<40?[15,30,15]:15);
        phase='ready';setTimeout(newRound,900);}
      else{lives--;livesEl.textContent='❤️'.repeat(lives)+'🖤'.repeat(3-lives);
        result.style.color='#e8524a';result.textContent='Raté de '+(err/1000).toFixed(3)+'s';vibrate([30,40,80]);
        if(lives<=0){setTimeout(end,700);}else{phase='ready';setTimeout(newRound,900);}}
    }
  });
  document.getElementById('startBtn').onclick=start;
  document.getElementById('replayBtn').onclick=start;
})();
</script>
</body>
</html>
