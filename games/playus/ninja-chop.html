<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Ninja Chop · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#7fb069,#3a6b2a);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#e6ffd8;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#cdebc0}
  .barwrap{width:100%;max-width:520px;padding:0 18px 6px}
  .bar{height:12px;border-radius:8px;background:rgba(0,0,0,.2);overflow:hidden}.bar>div{height:100%;width:100%;background:linear-gradient(90deg,#e8524a,#ffd45e)}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .halves{position:absolute;inset:0;display:flex}
  .halves>div{flex:1}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#e6ffd8;font-weight:700;font-size:.9rem;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.3)}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(20,40,15,.82);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e6ffd8;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3fb562,#7ac94b);box-shadow:0 8px 24px rgba(63,181,98,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour à l'accueil">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div class="barwrap"><div class="bar"><div id="barFill"></div></div></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="halves"><div id="hL"></div><div id="hR"></div></div>
    <div class="hint">Tape à gauche / droite pour couper</div>
    <div class="screen" id="start"><h1>🥷 Ninja Chop</h1><p>Coupe le tronc en tapant à gauche ou à droite. Change de côté pour éviter les branches&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1 id="overTitle">Aïe&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">coups</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),barFill=document.getElementById('barFill');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_ninjachop_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  // Pile de segments de tronc, chacun avec branche à gauche/droite/aucune.
  var state,score,side,segs=[],time,maxTime,chopAnim=0;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function mkSeg(prevBranch){var b=Math.random()<0.45?(Math.random()<0.5?'L':'R'):'';
    // évite branche du même côté que la précédente immédiate pour rester jouable
    return {branch:b};}
  function start(){resize();score=0;side='L';segs=[];for(var i=0;i<12;i++)segs.push(mkSeg());
    segs[0].branch='';segs[1].branch='';maxTime=100;time=maxTime;chopAnim=0;
    state='play';scoreEl.textContent='0';barFill.style.width='100%';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(hit){state='over';document.getElementById('overTitle').textContent=hit?'Branche ! 🌿':'Temps écoulé !';
    document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='coups';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  function chop(s){if(state!=='play')return;side=s;
    var bottom=segs[0];
    if(bottom.branch===s){end(true);return;}
    segs.shift();segs.push(mkSeg());score++;scoreEl.textContent=score;
    time=Math.min(maxTime,time+8);chopAnim=1;vibrate(8);
  }
  document.getElementById('hL').addEventListener('pointerdown',function(){chop('L');});
  document.getElementById('hR').addEventListener('pointerdown',function(){chop('R');});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);var cx=W/2,segH=Math.max(48,H*0.09),tw=Math.max(46,W*0.14);
    if(state==='play'){time-=0.16;if(chopAnim>0)chopAnim-=0.12;barFill.style.width=Math.max(0,time/maxTime*100)+'%';if(time<=0)end(false);}
    // tronc
    for(var i=0;i<segs.length;i++){var y=H-90-i*segH;if(y<-segH)break;
      ctx.fillStyle=i%2?'#8a5a2b':'#9a6a3b';ctx.fillRect(cx-tw/2,y-segH,tw,segH);
      ctx.strokeStyle='rgba(0,0,0,.2)';ctx.strokeRect(cx-tw/2,y-segH,tw,segH);
      if(segs[i].branch){var bx=segs[i].branch==='L'?cx-tw/2:cx+tw/2,dir=segs[i].branch==='L'?-1:1;
        ctx.fillStyle='#3a6b2a';ctx.fillRect(segs[i].branch==='L'?bx-tw*0.9:bx,y-segH*0.7,tw*0.9,14);
        ctx.beginPath();ctx.arc(bx+dir*tw*0.9,y-segH*0.7+7,20,0,7);ctx.fillStyle='#4e8a35';ctx.fill();}
    }
    // ninja
    var nx=side==='L'?cx-tw/2-34:cx+tw/2+34;
    ctx.font=(48-chopAnim*6)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.save();ctx.translate(nx,H-90-24);if(side==='R')ctx.scale(-1,1);ctx.fillText('🥷',0,0);ctx.restore();
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
