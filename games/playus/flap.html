<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Flap · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#6a4fd6,#3a2a8c);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#e6ddff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#cbbdf5}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(30,20,80,.78);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e6ddff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ffb020,#ff7a3d);box-shadow:0 8px 24px rgba(255,122,61,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="screen" id="start"><h1>🐤 Flap</h1><p>Tape l'écran pour donner un coup d'aile et passe entre les tuyaux. Ne touche rien&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Boum&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">tuyaux passés</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_flap_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  var state,score,by,vy,pipes,gap,pw,speed,spawnX;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function start(){resize();score=0;by=H*0.4;vy=0;pipes=[];gap=Math.max(150,H*0.30);pw=64;speed=2.6;spawnX=0;
    scoreEl.textContent='0';state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');addPipe(W+80);addPipe(W+80+(W*0.62));}
  function addPipe(x){var m=70;pipes.push({x:x,top:m+Math.random()*(H-gap-2*m),passed:false});}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='tuyaux passés';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(){if(state==='play'){vy=-Math.max(6.4,H*0.011);vibrate(8);}});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);var bx=W*0.28,br=Math.max(13,W*0.035);
    if(state==='play'){vy+=Math.max(0.4,H*0.0007);by+=vy;
      pipes.forEach(function(p){p.x-=speed;});
      if(pipes.length&&pipes[pipes.length-1].x<W-W*0.62)addPipe(W+40);
      if(pipes.length&&pipes[0].x<-pw)pipes.shift();
      pipes.forEach(function(p){
        if(!p.passed&&p.x+pw<bx){p.passed=true;score++;scoreEl.textContent=score;speed+=0.04;vibrate(10);}
        if(bx+br>p.x&&bx-br<p.x+pw&&(by-br<p.top||by+br>p.top+gap))end();
      });
      if(by+br>H||by-br<0)end();
    }
    ctx.fillStyle='#4ec97a';pipes.forEach(function(p){ctx.fillRect(p.x,0,pw,p.top);ctx.fillRect(p.x,p.top+gap,pw,H-p.top-gap);
      ctx.fillStyle='#3aa862';ctx.fillRect(p.x-4,p.top-18,pw+8,18);ctx.fillRect(p.x-4,p.top+gap,pw+8,18);ctx.fillStyle='#4ec97a';});
    ctx.save();ctx.translate(bx,by);ctx.rotate(Math.max(-0.5,Math.min(1,vy*0.05)));
    ctx.beginPath();ctx.arc(0,0,br,0,7);ctx.fillStyle='#ffd45e';ctx.fill();
    ctx.beginPath();ctx.arc(br*0.35,-br*0.3,br*0.28,0,7);ctx.fillStyle='#fff';ctx.fill();
    ctx.beginPath();ctx.arc(br*0.45,-br*0.3,br*0.13,0,7);ctx.fillStyle='#222';ctx.fill();
    ctx.beginPath();ctx.moveTo(br*0.9,0);ctx.lineTo(br*1.5,-br*0.25);ctx.lineTo(br*1.5,br*0.25);ctx.fillStyle='#ff8a3d';ctx.fill();ctx.restore();
  }
  resize();frame();
})();
</script>
</body>
</html>
