<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Piano · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 20%,#5a2a7a,#160a24 75%);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#e0b8ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#c8a0e6}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(20,8,32,.85);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e0b8ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#8b3fd6,#c94b9e);box-shadow:0 8px 24px rgba(139,63,214,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="screen" id="start"><h1>🎹 Piano</h1><p>Tape les tuiles noires qui descendent, dans la bonne colonne, sans en rater une seule&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1 id="overTitle">Raté&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">tuiles jouées</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_piano_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  var SCALE=[261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25],ac,si=0;
  function tone(){try{ac=ac||new (window.AudioContext||window.webkitAudioContext)();var f=SCALE[si%SCALE.length];si++;
    var o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;o.type='triangle';o.connect(g);g.connect(ac.destination);
    g.gain.setValueAtTime(0.0001,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.3,ac.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+0.25);o.start();o.stop(ac.currentTime+0.27);}catch(e){}}
  var state,tiles=[],score,speed,spawnAcc,lastTs,rowH;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function start(){resize();tiles=[];score=0;speed=Math.max(3,H*0.006);spawnAcc=999;lastTs=performance.now();rowH=H*0.24;si=0;
    try{ac=ac||new (window.AudioContext||window.webkitAudioContext)();}catch(e){}
    state='play';scoreEl.textContent='0';startScr.classList.add('hidden');overScr.classList.add('hidden');
    // colonne de départ
    tiles.push({col:Math.floor(Math.random()*4),y:-rowH,hit:false});requestAnimationFrame(loop);}
  function end(msg){state='over';document.getElementById('overTitle').textContent=msg;document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='tuiles jouées';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(e){if(state!=='play')return;var rect=cv.getBoundingClientRect();var px=e.clientX-rect.left,py=e.clientY-rect.top;
    var col=Math.floor(px/(W/4));
    // trouve la tuile la plus basse non frappée de cette colonne, présente dans la zone
    var cand=null;tiles.forEach(function(t){if(t.col===col&&!t.hit&&t.y+rowH>0&&t.y<H){if(!cand||t.y>cand.y)cand=t;}});
    if(cand&&cand.y+rowH>H*0.4){cand.hit=true;score++;scoreEl.textContent=score;tone();speed+=0.02;vibrate(6);}
    else{end('À côté !');}
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function loop(ts){requestAnimationFrame(loop);var dt=ts-lastTs;lastTs=ts;ctx.clearRect(0,0,W,H);var colW=W/4;
    if(state==='play'){tiles.forEach(function(t){t.y+=speed;});
      var last=tiles[tiles.length-1];if(last&&last.y>rowH*0.9){tiles.push({col:Math.floor(Math.random()*4),y:last.y-rowH,hit:false});}
      // ratée : une tuile non frappée sort en bas
      for(var i=tiles.length-1;i>=0;i--){var t=tiles[i];if(t.y>H&&!t.hit){end('Tuile ratée !');return;}
        if(t.y>H+rowH)tiles.splice(i,1);}
    }
    // colonnes
    for(var c=1;c<4;c++){ctx.strokeStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.moveTo(c*colW,0);ctx.lineTo(c*colW,H);ctx.stroke();}
    // ligne de frappe
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.setLineDash([8,8]);ctx.beginPath();ctx.moveTo(0,H*0.4);ctx.lineTo(W,H*0.4);ctx.stroke();ctx.setLineDash([]);
    tiles.forEach(function(t){var x=t.col*colW+4;ctx.fillStyle=t.hit?'rgba(122,201,75,.4)':'#141018';
      ctx.fillRect(x,t.y,colW-8,rowH-6);if(!t.hit){ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(x,t.y,colW-8,6);}});
  }
  resize();requestAnimationFrame(loop);
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
