<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Balls & Cups · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 25%,#1a2a5a,#060a1e 75%);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#a8c0ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.6rem}.best{font-size:.8rem;color:#8aa0e0}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  #status{position:absolute;top:12px;left:0;right:0;text-align:center;font-weight:800;font-size:1.1rem;color:#a8c0ff;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(6,10,30,.85);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#a8c0ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#4a7de8,#8b3fd6);box-shadow:0 8px 24px rgba(74,125,232,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour à l'accueil">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="status"></div>
    <div class="screen" id="start"><h1>🥤 Balls & Cups</h1><p>Suis la balle des yeux pendant que les gobelets s'intervertissent, puis désigne le bon&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Raté&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">manches gagnées</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage'),status=document.getElementById('status');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_ballscups_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  // 3 gobelets à positions 0,1,2. cups[k] = index de slot pour le gobelet k.
  var state,score,cups=[],ballCup,lift,phase,shuffleLeft,anim;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function slotX(s){return W*(0.28+s*0.22);}
  function start(){resize();score=0;scoreEl.textContent='0';startScr.classList.add('hidden');overScr.classList.add('hidden');newRound();}
  function newRound(){cups=[{s:0,x:slotX(0)},{s:1,x:slotX(1)},{s:2,x:slotX(2)}];ballCup=Math.floor(Math.random()*3);
    lift=1;phase='reveal';status.textContent='Regarde bien…';state='play';
    setTimeout(function(){lift=0;phase='shuffle';shuffleLeft=4+score;status.textContent='Suis la balle…';doSwap();},1100);}
  function doSwap(){if(shuffleLeft<=0){phase='pick';status.textContent='Où est la balle ?';return;}
    shuffleLeft--;var a=Math.floor(Math.random()*3),b;do{b=Math.floor(Math.random()*3);}while(b===a);
    var tmp=cups[a].s;cups[a].s=cups[b].s;cups[b].s=tmp;anim={a:a,b:b,t:0};
  }
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='manches gagnées';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(e){if(state!=='play'||phase!=='pick')return;var rect=cv.getBoundingClientRect();var px=e.clientX-rect.left;
    var pick=-1;cups.forEach(function(c,k){if(Math.abs(c.x-px)<W*0.11)pick=k;});
    if(pick<0)return;lift=1;phase='result';
    if(pick===ballCup){score++;scoreEl.textContent=score;status.textContent='Gagné ! 🎉';vibrate([10,20,10]);setTimeout(newRound,1000);}
    else{status.textContent='Perdu !';cups.forEach(function(c,k){});setTimeout(end,900);}
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);var baseY=H*0.6,cupW=W*0.16,cupH=W*0.22;
    // anim de swap
    if(anim){anim.t+=0.06;if(anim.t>=1)anim=null;}
    cups.forEach(function(c){var tx=slotX(c.s);c.x+=(tx-c.x)*0.25;});
    // balle si visible
    var showBall=(phase==='reveal'||phase==='result');
    // tri d'affichage par x (les gobelets qui se croisent)
    var order=cups.map(function(c,k){return {c:c,k:k};}).sort(function(a,b){return a.c.x-b.c.x;});
    order.forEach(function(o){var c=o.c,k=o.k;var lifted=(k===ballCup&&showBall)?Math.min(lift,1)*cupH*0.8:0;
      // balle
      if(k===ballCup&&showBall){ctx.beginPath();ctx.arc(c.x,baseY-6,cupW*0.28,0,7);ctx.fillStyle='#ffd45e';ctx.fill();}
      // gobelet
      ctx.save();ctx.translate(c.x,baseY-lifted);
      ctx.fillStyle='#4a7de8';ctx.beginPath();ctx.moveTo(-cupW*0.5,0);ctx.lineTo(cupW*0.5,0);ctx.lineTo(cupW*0.36,-cupH);ctx.lineTo(-cupW*0.36,-cupH);ctx.closePath();ctx.fill();
      ctx.fillStyle='#2a4aa0';ctx.fillRect(-cupW*0.4,-cupH-8,cupW*0.8,10);
      ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(-cupW*0.3,-cupH*0.9,8,cupH*0.8);ctx.restore();
    });
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
