<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Center Hit · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 30%,#1c1740,#0c0a1e 70%);display:flex;flex-direction:column;
    align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#c7bffb;text-decoration:none;font-size:1.4rem;line-height:1}
  .score{font-size:1.6rem}
  .best{font-size:.8rem;color:#9d94d6;font-weight:600}
  #stage{flex:1;width:100%;max-width:520px;position:relative;touch-action:manipulation}
  canvas{display:block;width:100%;height:100%}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;
    text-align:center;padding:24px;background:rgba(12,10,30,.82);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}
  .screen h1{font-size:2.2rem;font-weight:900;letter-spacing:-.5px}
  .screen p{color:#c7bffb;max-width:280px;line-height:1.4;font-size:.95rem}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;
    background:linear-gradient(135deg,#8b3fd6,#c94b9e);box-shadow:0 8px 24px rgba(139,63,214,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="screen" id="start">
      <h1>🎯 Center Hit</h1>
      <p>Tape pour lancer un couteau sur la cible qui tourne. Ne touche jamais un couteau déjà planté&nbsp;!</p>
      <button class="btn" id="startBtn">Jouer</button>
    </div>
    <div class="screen hidden" id="over">
      <h1>Raté&nbsp;!</h1>
      <div class="big" id="finalScore">0</div>
      <p id="overMsg">Couteaux plantés</p>
      <button class="btn" id="replayBtn">Rejouer</button>
    </div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  var stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;
    cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);

  var BEST_KEY='playus_centerhit_best';
  var best=+localStorage.getItem(BEST_KEY)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}
  showBest();

  var state='idle',score,knives,rot,speed,cx,cy,R,flying;
  function reset(){score=0;knives=[];rot=0;speed=0.02;flying=null;scoreEl.textContent='0';}
  function start(){resize();reset();state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function vibrate(ms){if(navigator.vibrate)navigator.vibrate(ms);}

  function gameOver(){
    state='over';
    document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST_KEY,best);document.getElementById('overMsg').textContent='Nouveau record ! 🏆';}
    else document.getElementById('overMsg').textContent='Couteaux plantés';
    showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);
  }

  function launch(){
    if(state!=='play'||flying)return;
    flying={t:0};
  }
  stage.addEventListener('pointerdown',function(e){
    if(state==='play')launch();
  });
  document.getElementById('startBtn').onclick=start;
  document.getElementById('replayBtn').onclick=start;

  function stick(){
    // angle du bas (PI/2) ramené dans le repère de la cible
    var a=((Math.PI/2 - rot)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
    for(var i=0;i<knives.length;i++){
      var d=Math.abs(((a-knives[i])+Math.PI)%(2*Math.PI)-Math.PI);
      if(d<0.30){gameOver();return;}
    }
    knives.push(a);score++;scoreEl.textContent=score;
    speed=(0.02+score*0.0016)*(1);vibrate(15);
  }

  function frame(){
    requestAnimationFrame(frame);
    cx=W/2;cy=H*0.40;R=Math.min(W,H)*0.20;
    ctx.clearRect(0,0,W,H);
    if(state==='play')rot+=speed;
    // cible
    ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);
    ctx.beginPath();ctx.arc(0,0,R,0,7);ctx.fillStyle='#e8524a';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,R*0.62,0,7);ctx.fillStyle='#f2e9d8';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,R*0.24,0,7);ctx.fillStyle='#e8524a';ctx.fill();
    // couteaux plantés
    knives.forEach(function(a){
      ctx.save();ctx.rotate(a-Math.PI/2);
      ctx.fillStyle='#cfd4dc';ctx.fillRect(-3,R,6,R*0.72);
      ctx.fillStyle='#7a5230';ctx.fillRect(-4,R+R*0.72,8,R*0.28);
      ctx.restore();
    });
    ctx.restore();
    // couteau volant / en attente
    var ky=H-70;
    if(flying){flying.t+=0.16;ky=(H-70)-(H-70-(cy+R))*flying.t;
      if(flying.t>=1){flying=null;stick();ky=cy+R;}}
    if(state==='play'){
      ctx.fillStyle='#cfd4dc';ctx.fillRect(cx-3,ky,6,52);
      ctx.fillStyle='#7a5230';ctx.fillRect(cx-4,ky+52,8,20);
    }
  }
  resize();frame();
})();
</script>
</body>
</html>
