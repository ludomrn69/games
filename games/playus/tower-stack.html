<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Tower Stack · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#87ceeb,#3a6ba0);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#fff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#e0f0ff}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#fff;font-weight:700;font-size:.9rem;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.3)}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(20,50,80,.8);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e6f2ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#e8524a,#ff7a3d);box-shadow:0 8px 24px rgba(232,82,74,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Tape pour poser le bloc</div>
    <div class="screen" id="start"><h1>🗼 Tower Stack</h1><p>Le bloc défile. Tape pour l'empiler pile au-dessus du précédent. Ce qui dépasse est coupé&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Fini&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">blocs empilés</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_towerstack_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  var state,score,stack=[],cur,dir,speed,bh,camY=0,hue,falling=[];
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function newBlock(){var top=stack[stack.length-1];hue=(hue+24)%360;
    cur={x:dir>0?-top.w:W,w:top.w,y:top.y-bh,color:'hsl('+hue+',65%,58%)'};speed=Math.max(3.5,W*0.011)+score*0.12;}
  function start(){resize();score=0;bh=Math.max(26,H*0.045);hue=200;dir=1;camY=0;falling=[];
    var w0=Math.min(W*0.5,200);stack=[{x:W/2-w0/2,w:w0,y:H-90,color:'hsl(200,65%,58%)'}];
    newBlock();state='play';scoreEl.textContent='0';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='blocs empilés';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(){if(state!=='play')return;
    var top=stack[stack.length-1];var left=Math.max(cur.x,top.x),right=Math.min(cur.x+cur.w,top.x+top.w);
    var overlap=right-left;
    if(overlap<=0){falling.push({x:cur.x,y:cur.y,w:cur.w,vy:-1.5,rot:0,vr:(Math.random()-0.5)*0.18,color:cur.color});end();return;}
    // le morceau qui depasse est COUPE : il tombe (petite physique) au lieu de disparaitre
    if(overlap<cur.w-0.5){var cutW=cur.w-overlap;var cutX=(cur.x<left)?cur.x:right;
      falling.push({x:cutX,y:cur.y,w:cutW,vy:-1.2,rot:0,vr:(cutX<left?-1:1)*(0.06+Math.random()*0.12),color:cur.color});}
    cur.x=left;cur.w=overlap;stack.push({x:left,w:overlap,y:cur.y,color:cur.color});
    score++;scoreEl.textContent=score;vibrate(overlap>top.w-4?[15,25,15]:10);
    dir=-dir;newBlock();
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);
    if(state==='play'){cur.x+=speed*dir;if(cur.x<-cur.w){cur.x=-cur.w;dir=1;}if(cur.x>W){cur.x=W;dir=-1;}
      var targetCam=Math.max(0,(H*0.4)-cur.y);camY+=(targetCam-camY)*0.1;
    }
    ctx.save();ctx.translate(0,camY);
    stack.forEach(function(b){ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,bh);
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(b.x,b.y,b.w,5);});
    for(var fi=falling.length-1;fi>=0;fi--){var f=falling[fi];
      f.vy+=0.55;f.y+=f.vy;f.rot+=f.vr;
      if(f.y-camY>H+120){falling.splice(fi,1);continue;}
      ctx.save();ctx.translate(f.x+f.w/2,f.y+bh/2);ctx.rotate(f.rot);ctx.globalAlpha=0.9;
      ctx.fillStyle=f.color;ctx.fillRect(-f.w/2,-bh/2,f.w,bh);
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(-f.w/2,-bh/2,f.w,5);ctx.restore();}
    if(state==='play'){ctx.fillStyle=cur.color;ctx.fillRect(cur.x,cur.y,cur.w,bh);ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(cur.x,cur.y,cur.w,5);}
    ctx.restore();
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
