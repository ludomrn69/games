<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Trampbox · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#6b3fd6,#3a1a6c);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#e0d8ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#c5b8f5}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#e0d8ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(30,18,80,.8);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e0d8ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ffb020,#ff7a3d);box-shadow:0 8px 24px rgba(255,122,61,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour à l'accueil">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Tape pile quand la boîte touche le trampoline</div>
    <div class="screen" id="start"><h1>📦 Trampbox</h1><p>La boîte tombe sur le trampoline. Tape à l'instant exact de l'impact pour rebondir le plus haut&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Raté&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">rebonds réussis</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_trampbox_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  var state,score,y,vy,g,size,trampY,squash,tapped;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function drop(top){y=top;vy=0;tapped=false;}
  function start(){resize();score=0;size=Math.max(40,W*0.13);g=Math.max(0.5,H*0.0009);trampY=H-70;squash=0;
    scoreEl.textContent='0';state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');drop(90);}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='rebonds réussis';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(){if(state!=='play'||tapped)return;tapped=true;
    var boxBottom=y+size,dist=Math.abs(boxBottom-trampY);
    if(vy>0&&dist<size*0.9){ // à l'impact
      var quality=1-dist/(size*0.9);// 0..1
      if(quality>0.15){var boost=1+quality*1.4;vy=-Math.max(9,H*0.016)*boost;score++;scoreEl.textContent=score;
        squash=1;g+=0.02;vibrate(quality>0.8?[15,25,15]:12);}
      else end();
    } else end();
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);
    if(state==='play'){vy+=g;y+=vy;if(squash>0)squash-=0.08;
      if(y+size>trampY+30&&vy>0)end(); // passé à travers sans taper
      if(y<-size*2)drop(-size); // remonte trop haut => rien, redescend
    }
    // trampoline
    var tw=Math.max(140,W*0.5),tx=W/2-tw/2,sag=squash>0?squash*22:0;
    ctx.strokeStyle='#ffd45e';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(tx,trampY);ctx.quadraticCurveTo(W/2,trampY+sag,tx+tw,trampY);ctx.stroke();
    ctx.fillStyle='#c94b9e';ctx.fillRect(tx-8,trampY,10,60);ctx.fillRect(tx+tw-2,trampY,10,60);
    // boîte
    var sq=squash>0?squash*0.25:0,bw=size*(1+sq),bh=size*(1-sq);
    ctx.fillStyle='#ffb020';ctx.fillRect(W/2-bw/2,y+size-bh,bw,bh);
    ctx.fillStyle='#d98a10';ctx.fillRect(W/2-bw/2,y+size-bh,bw,6);
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
