<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Dangerwall · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 40%,#2a1050,#0a0418 75%);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#c9a8ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#a98cd6}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#c9a8ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(12,4,26,.85);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#c9a8ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#8b3fd6,#c94b9e);box-shadow:0 8px 24px rgba(139,63,214,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour à l'accueil">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Touche l'écran pour bondir vers le haut</div>
    <div class="screen" id="start"><h1>🧊 Dangerwall</h1><p>Ton cube rebondit d'un mur à l'autre. <b>Touche l'écran</b> pour le faire bondir et vise les <b>trous entre les piques</b>. À chaque mur franchi, de nouvelles piques apparaissent — de plus en plus serrées&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Aïe&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">murs franchis</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_dangerwall_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}

  // Le cube rebondit horizontalement d'un mur à l'autre. La gravité le tire vers le
  // bas, un tap le fait bondir vers le HAUT (haut/bas bornés à l'écran). Chaque mur
  // porte des piques SAUF des trous : atteindre le mur dans un trou = franchi (score+1,
  // le cube repart dans l'autre sens et CE mur régénère de nouvelles piques, plus
  // serrées à mesure que le score monte). Toucher une pique = perdu.
  var state,score,cube,cubeSz,wallW,grav,jump,spikesL,spikesR;
  function diff(){ return Math.min(1, score/45); }         // 0 → 1 : difficulté croissante
  function gapH(){ return cubeSz*(2.6 - diff()*1.5); }      // hauteur des trous (rétrécit)
  // Génère les piques d'un mur : des trous (≥ gapH) séparés par des dents.
  function genSpikes(){
    var arr=[], y=4, gmin=gapH(), gmax=gmin+cubeSz*(1.6-diff()*0.9);
    while(y<H-4){
      y += gmin + Math.random()*Math.max(0,gmax-gmin);      // trou
      if(y>=H-4) break;
      var sh=cubeSz*(0.7+Math.random()*(1.1+diff()*1.4));   // dent (plus grande si dur)
      sh=Math.min(sh,H-4-y);
      if(sh>6) arr.push({y:y,h:sh});
      y += sh;
    }
    return arr;
  }
  function reset(){
    resize();
    wallW=Math.max(14,W*0.055);
    cubeSz=Math.max(24,W*0.07);
    grav=Math.max(0.35,H*0.0010);
    jump=Math.max(7,H*0.014);
    cube={x:wallW+cubeSz/2, y:H*0.5, vx:Math.max(2.4,W*0.007), vy:0};
    score=0; spikesL=genSpikes(); spikesR=genSpikes();
    state='play'; scoreEl.textContent='0'; startScr.classList.add('hidden'); overScr.classList.add('hidden');
  }
  function end(){
    state='over'; document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='murs franchis';
    showBest(); overScr.classList.remove('hidden'); vibrate([40,60,120]);
  }
  stage.addEventListener('pointerdown',function(){ if(state==='play') cube.vy=-jump; });
  document.getElementById('startBtn').onclick=reset;
  document.getElementById('replayBtn').onclick=reset;

  function hitsSpike(list){
    var r=cubeSz/2;
    for(var i=0;i<list.length;i++){ var s=list[i]; if(cube.y+r>s.y && cube.y-r<s.y+s.h) return true; }
    return false;
  }
  function step(){
    var r=cubeSz/2;
    cube.vy+=grav; cube.y+=cube.vy; cube.x+=cube.vx;
    // haut / bas : on borne (rebond doux), seules les piques tuent
    if(cube.y-r<0){ cube.y=r; if(cube.vy<0) cube.vy=0; }
    if(cube.y+r>H){ cube.y=H-r; cube.vy=0; }
    // contact d'un mur
    if(cube.x-r<=wallW){
      if(hitsSpike(spikesL)){ end(); return; }
      cube.x=wallW+r; cube.vx=Math.abs(cube.vx); onWallCleared('L');
    } else if(cube.x+r>=W-wallW){
      if(hitsSpike(spikesR)){ end(); return; }
      cube.x=W-wallW-r; cube.vx=-Math.abs(cube.vx); onWallCleared('R');
    }
  }
  function onWallCleared(side){
    score++; scoreEl.textContent=score; vibrate(10);
    // vitesse horizontale accélère un peu ; le mur qu'on vient de quitter se renouvelle
    var dir=cube.vx<0?-1:1, sp=Math.min(W*0.018, Math.max(2.4,W*0.007)+score*0.0035);
    cube.vx=dir*sp;
    if(side==='L') spikesL=genSpikes(); else spikesR=genSpikes();
  }
  function drawWallSpikes(side,list){
    var depth=wallW*0.85, teeth=5;
    ctx.fillStyle='#c94b9e';
    list.forEach(function(s){ var th=s.h/teeth;
      for(var t=0;t<teeth;t++){ var yy=s.y+t*th;
        ctx.beginPath();
        if(side==='L'){ ctx.moveTo(0,yy); ctx.lineTo(depth,yy+th/2); ctx.lineTo(0,yy+th); }
        else{ ctx.moveTo(W,yy); ctx.lineTo(W-depth,yy+th/2); ctx.lineTo(W,yy+th); }
        ctx.closePath(); ctx.fill();
      }
    });
  }
  function frame(){
    requestAnimationFrame(frame);
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(139,63,214,.35)'; ctx.fillRect(0,0,wallW,H); ctx.fillRect(W-wallW,0,wallW,H);
    if(state==='play') step();
    drawWallSpikes('L',spikesL); drawWallSpikes('R',spikesR);
    var r=cubeSz/2;
    ctx.save(); ctx.translate(cube.x,cube.y);
    ctx.fillStyle='#ffd45e'; ctx.fillRect(-r,-r,cubeSz,cubeSz);
    ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fillRect(-r,-r,cubeSz,6);
    ctx.strokeStyle='#d98a10'; ctx.lineWidth=3; ctx.strokeRect(-r,-r,cubeSz,cubeSz);
    ctx.restore();
  }
  resize();
  cube={x:W/2,y:H*0.5,vx:3,vy:0}; spikesL=[]; spikesR=[]; state='start'; score=0;
  frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
