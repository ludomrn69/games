<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Dangerwall · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 40%,#2a1050,#0a0418 75%);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#c9a8ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#a98cd6}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#c9a8ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(12,4,26,.85);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#c9a8ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#8b3fd6,#c94b9e);box-shadow:0 8px 24px rgba(139,63,214,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Touche l'écran pour sauter</div>
    <div class="screen" id="start"><h1>🧊 Dangerwall</h1><p>Ton cube rebondit de mur en mur. <b>Touche l'écran</b> pour le faire bondir et grimpe le plus haut possible en évitant les <b>piques</b> sur les côtés&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Aïe&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">mètres grimpés</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_dangerwall_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}

  // Le cube rebondit horizontalement de mur en mur ; la gravité le tire vers le bas,
  // un tap lui donne une impulsion vers le HAUT. Des piques poussent sur les murs
  // gauche/droite : toucher un mur à l'endroit d'une pique = perdu. On grimpe →
  // le monde défile vers le bas, le score = hauteur atteinte.
  var state,score,cube,spikes,wallW,cubeSz,grav,jump,scrolled,spawnAt;
  function reset(){
    resize();
    wallW=Math.max(14,W*0.05);
    cubeSz=Math.max(26,W*0.075);
    grav=Math.max(0.4,H*0.0011);
    jump=Math.max(8,H*0.016);
    var r=cubeSz/2;
    cube={x:wallW+r,y:H*0.55,vx:Math.max(2.6,W*0.008),vy:0};
    spikes=[];            // {side:'L'|'R', y, h}
    score=0;scrolled=0;spawnAt=H*0.35;
    state='play';scoreEl.textContent='0';startScr.classList.add('hidden');overScr.classList.add('hidden');
    // quelques piques de départ, jamais trop près du cube
    for(var y=-40;y>-H*1.4;y-=(90+Math.random()*70)){addSpike(y);}
  }
  function addSpike(y){
    var side=Math.random()<0.5?'L':'R';
    var h=Math.max(46,cubeSz*1.5)+Math.random()*cubeSz;
    spikes.push({side:side,y:y,h:h});
  }
  function end(){
    state='over';var m=Math.round(score);
    document.getElementById('finalScore').textContent=m;
    if(m>best){best=m;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='mètres grimpés';
    showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);
  }
  function hop(){ if(state==='play') cube.vy=-jump; }
  stage.addEventListener('pointerdown',function(){ if(state==='play') hop(); });
  document.getElementById('startBtn').onclick=reset;
  document.getElementById('replayBtn').onclick=reset;

  function step(){
    var r=cubeSz/2;
    cube.vy+=grav; cube.y+=cube.vy; cube.x+=cube.vx;
    // rebond sur les murs + test des piques à ce mur
    if(cube.x-r<=wallW){ cube.x=wallW+r; cube.vx=Math.abs(cube.vx); hitWall('L'); }
    else if(cube.x+r>=W-wallW){ cube.x=W-wallW-r; cube.vx=-Math.abs(cube.vx); hitWall('R'); }
    // défilement : si le cube monte au-dessus de 45% de l'écran, on descend le monde
    var top=H*0.45;
    if(cube.y<top){ var d=top-cube.y; cube.y=top; scrolled+=d; score+=d/32;
      scoreEl.textContent=Math.round(score);
      for(var i=0;i<spikes.length;i++) spikes[i].y+=d;
    }
    // chute hors de l'écran
    if(cube.y-r>H){ end(); return; }
    // faire pousser de nouvelles piques en haut au fil de la montée
    var highest=spikes.reduce(function(a,s){return Math.min(a,s.y);},H);
    while(highest>-H*0.6){ highest-=(70+Math.random()*70/(1+score*0.002)); addSpike(highest); }
    // nettoyage
    spikes=spikes.filter(function(s){return s.y<H+60;});
    // vitesse horizontale qui augmente doucement
    var dir=cube.vx<0?-1:1; var sp=Math.min(W*0.02,Math.max(2.6,W*0.008)+score*0.004); cube.vx=dir*sp;
  }
  function hitWall(side){
    var r=cubeSz/2;
    for(var i=0;i<spikes.length;i++){var s=spikes[i];
      if(s.side!==side)continue;
      if(cube.y+r> s.y && cube.y-r < s.y+s.h){ end(); return; }
    }
    vibrate(6);
  }

  function drawSpikes(){
    var teeth=6;
    spikes.forEach(function(s){
      ctx.fillStyle='#c94b9e';
      var depth=wallW*0.9, th=s.h/teeth;
      for(var t=0;t<teeth;t++){var yy=s.y+t*th;
        ctx.beginPath();
        if(s.side==='L'){ctx.moveTo(0,yy);ctx.lineTo(depth,yy+th/2);ctx.lineTo(0,yy+th);}
        else{ctx.moveTo(W,yy);ctx.lineTo(W-depth,yy+th/2);ctx.lineTo(W,yy+th);}
        ctx.closePath();ctx.fill();
      }
    });
  }
  function frame(){
    requestAnimationFrame(frame);
    ctx.clearRect(0,0,W,H);
    // murs latéraux
    ctx.fillStyle='rgba(139,63,214,.35)';
    ctx.fillRect(0,0,wallW,H); ctx.fillRect(W-wallW,0,wallW,H);
    if(state==='play') step();
    drawSpikes();
    // cube
    var r=cubeSz/2;
    ctx.save();ctx.translate(cube.x,cube.y);
    ctx.fillStyle='#ffd45e';ctx.fillRect(-r,-r,cubeSz,cubeSz);
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillRect(-r,-r,cubeSz,6);
    ctx.strokeStyle='#d98a10';ctx.lineWidth=3;ctx.strokeRect(-r,-r,cubeSz,cubeSz);
    ctx.restore();
  }
  resize();
  cube={x:W/2,y:H*0.55,vx:3,vy:0};spikes=[];state='start';score=0;
  frame();
})();
</script>
</body>
</html>
