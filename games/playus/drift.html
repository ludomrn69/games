<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Drift! · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#5aa0d6,#2a6ba0);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#e6f2ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#c8e0f5}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#e6f2ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(20,50,80,.8);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e6f2ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ff7a3d,#e8524a);box-shadow:0 8px 24px rgba(232,82,74,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Maintiens appuyé pour tourner, relâche pour aller tout droit</div>
    <div class="screen" id="start"><h1>🏎️ Drift!</h1><p>La voiture avance seule. Maintiens ton doigt dans les virages pour déraper, relâche dans les lignes droites. Reste sur la route&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Sorti de route&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">distance</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_drift_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  // Route verticale qui défile. centerX(t) sinusoïdal. La voiture a une vitesse
  // latérale : appuyer courbe vers la gauche, relâcher courbe vers la droite.
  var state,score,dist,carX,carVX,holding,roadW,seed,speed,trail;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function centerAt(d){return W/2+Math.sin(d*0.006)*W*0.22+Math.sin(d*0.013+2)*W*0.10;}
  function start(){resize();score=0;dist=0;carX=W/2;carVX=0;holding=false;roadW=Math.max(120,W*0.42);speed=Math.max(3.5,H*0.006);trail=[];
    state='play';scoreEl.textContent='0';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='distance';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(){holding=true;});
  stage.addEventListener('pointerup',function(){holding=false;});stage.addEventListener('pointercancel',function(){holding=false;});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);var carY=H-90;
    if(state==='play'){dist+=speed;score=Math.floor(dist/40);scoreEl.textContent=score;speed+=0.0015;
      carVX+=(holding?-1:1)*Math.max(0.25,W*0.0008);carVX*=0.94;carX+=carVX;
      trail.push({x:carX,y:carY});if(trail.length>14)trail.shift();
      var c=centerAt(dist);if(Math.abs(carX-c)>roadW/2)end();
    }
    // route
    ctx.fillStyle='#2f3542';
    for(var y=-40;y<H+40;y+=8){var d=dist+(carY-y);var c=centerAt(d);ctx.fillRect(c-roadW/2,y,roadW,9);}
    // bandes centrales
    ctx.fillStyle='#ffd45e';for(var y2=(-dist*0.5)%40;y2<H;y2+=40){var d2=dist+(carY-y2);var c2=centerAt(d2);ctx.fillRect(c2-4,y2,8,20);}
    // traces de drift
    ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();
    trail.forEach(function(p,i){if(i===0)ctx.moveTo(p.x-8,p.y);else ctx.lineTo(p.x-8,p.y);});ctx.stroke();
    ctx.beginPath();trail.forEach(function(p,i){if(i===0)ctx.moveTo(p.x+8,p.y);else ctx.lineTo(p.x+8,p.y);});ctx.stroke();
    // voiture
    ctx.save();ctx.translate(carX,carY);ctx.rotate(Math.max(-0.5,Math.min(0.5,carVX*0.08)));
    ctx.fillStyle='#e8524a';ctx.fillRect(-16,-26,32,52);ctx.fillStyle='#7a1f1f';ctx.fillRect(-16,-26,32,10);
    ctx.fillStyle='#222';ctx.fillRect(-20,-20,6,14);ctx.fillRect(14,-20,6,14);ctx.fillRect(-20,8,6,14);ctx.fillRect(14,8,6,14);ctx.restore();
  }
  resize();frame();
})();
</script>
</body>
</html>
