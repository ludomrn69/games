<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Drift! · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#5aa0d6,#2a6ba0);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#e6f2ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#c8e0f5}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#fff;font-weight:700;font-size:.9rem;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.3)}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(20,50,80,.82);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e6f2ff;max-width:290px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ff7a3d,#e8524a);box-shadow:0 8px 24px rgba(232,82,74,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Maintiens pour t'accrocher au plot et tourner · relâche pour repartir droit</div>
    <div class="screen" id="start"><h1>🏎️ Drift!</h1><p>La voiture fonce tout droit. Maintiens le doigt pour t'accrocher au plot et déraper en cercle autour&nbsp;; relâche au bon moment pour viser le plot suivant&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Sorti de piste&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">virages négociés</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_drift_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  // Mécanique "pivot / twist" : la voiture avance droit. En maintenant, elle
  // s'accroche au plot cible et tourne en cercle autour. En relâchant, elle
  // repart en ligne droite (tangente). Il faut relâcher pour viser le plot suivant.
  var state,score,car={x:0,y:0},heading,mode,pegs=[],cur,pegR,orbitR,orbitA,orbitDir,speed,holding,trail=[];
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function addPeg(){var last=pegs[pegs.length-1];var side=(pegs.length%2===0)?1:-1;
    pegs.push({x:last.x+side*(W*0.26),y:last.y-(H*0.30)});}
  function start(){resize();score=0;pegR=Math.max(10,W*0.03);orbitR=Math.max(60,W*0.20);speed=Math.max(3.2,H*0.006);
    pegs=[{x:W/2,y:0}];for(var i=0;i<10;i++)addPeg();
    cur=0;mode='orbit';orbitA=Math.PI*0.5;orbitDir=1;holding=true;trail=[];
    car={x:pegs[0].x+orbitR,y:pegs[0].y};heading=0;
    state='play';scoreEl.textContent='0';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='virages négociés';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  function grab(i){var p=pegs[i];orbitR=Math.hypot(car.x-p.x,car.y-p.y);orbitA=Math.atan2(car.y-p.y,car.x-p.x);
    // sens de rotation cohérent avec la vitesse actuelle
    var cross=Math.cos(heading)*(car.y-p.y)-Math.sin(heading)*(car.x-p.x);orbitDir=cross>0?1:-1;
    cur=i;mode='orbit';score++;scoreEl.textContent=score;speed+=0.02;vibrate(10);
    while(pegs.length-cur<8)addPeg();}
  stage.addEventListener('pointerdown',function(){holding=true;});
  stage.addEventListener('pointerup',function(){holding=false;if(state==='play'&&mode==='orbit'){mode='fly';
    // repart tangentiellement
    heading=orbitA+orbitDir*Math.PI/2;}});
  stage.addEventListener('pointercancel',function(){holding=false;});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);
    if(state==='play'){
      if(mode==='orbit'){if(holding){var om=speed/orbitR;orbitA+=orbitDir*om;
          var p=pegs[cur];car.x=p.x+Math.cos(orbitA)*orbitR;car.y=p.y+Math.sin(orbitA)*orbitR;
          heading=orbitA+orbitDir*Math.PI/2;}
      }else{ // fly
        car.x+=Math.cos(heading)*speed;car.y+=Math.sin(heading)*speed;
        if(holding&&cur+1<pegs.length){var np=pegs[cur+1];if(Math.hypot(car.x-np.x,car.y-np.y)<orbitR*1.15+pegR)grab(cur+1);}
      }
      trail.push({x:car.x,y:car.y});if(trail.length>26)trail.shift();
      // caméra : la voiture reste vers le bas-centre
      var camX=W/2-car.x,camY=H*0.66-car.y;
      // hors-écran => crash
      var sx=car.x+camX,sy=car.y+camY;if(sx<-40||sx>W+40||sy<-40||sy>H+80)end();
    }
    var camX=W/2-car.x,camY=H*0.66-car.y;
    ctx.save();ctx.translate(camX,camY);
    // plots
    pegs.forEach(function(p,i){ctx.beginPath();ctx.arc(p.x,p.y,pegR,0,7);ctx.fillStyle=i===cur?'#ffd45e':'#e8524a';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,orbitR,0,7);ctx.globalAlpha=i===cur?0.35:0.08;ctx.stroke();ctx.globalAlpha=1;});
    // traces de drift
    ctx.strokeStyle='rgba(0,0,0,.28)';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();
    trail.forEach(function(t,i){if(i===0)ctx.moveTo(t.x,t.y);else ctx.lineTo(t.x,t.y);});ctx.stroke();
    // voiture
    ctx.save();ctx.translate(car.x,car.y);ctx.rotate(heading+Math.PI/2);
    ctx.fillStyle='#ff7a3d';ctx.fillRect(-13,-20,26,40);ctx.fillStyle='#a83a10';ctx.fillRect(-13,-20,26,9);
    ctx.fillStyle='#222';ctx.fillRect(-16,-15,5,11);ctx.fillRect(11,-15,5,11);ctx.fillRect(-16,7,5,11);ctx.fillRect(11,7,5,11);ctx.restore();
    ctx.restore();
  }
  resize();frame();
})();
</script>
</body>
</html>
