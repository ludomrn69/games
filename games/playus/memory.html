<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Memory · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 20%,#2a5ad6,#0c1a4a 75%);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#b8d0ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.4rem}.lives{font-size:1.2rem}
  #stage{flex:1;width:100%;max-width:520px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:16px}
  #status{font-weight:800;font-size:1.05rem;min-height:1.3em;color:#b8d0ff}
  #board{display:grid;gap:8px}
  .cell{aspect-ratio:1;border-radius:12px;background:transparent;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;cursor:pointer;transition:transform .08s,background .12s}
  .cell.num{background:linear-gradient(160deg,#4a7de8,#2a4aa0)}
  .cell.hidden-num{background:#dfe8ff;color:transparent}
  .cell.good{background:#3fb562;color:#fff}.cell.bad{background:#e8524a;color:#fff}
  .cell:active{transform:scale(.94)}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(8,16,40,.85);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#b8d0ff;max-width:280px;line-height:1.4}
  .big{font-size:3rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#4a7de8,#8b3fd6);box-shadow:0 8px 24px rgba(74,125,232,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">Niv. 1</span><span class="lives" id="lives"></span></div>
  <div id="stage">
    <div id="status">Mémorise les chiffres…</div>
    <div id="board"></div>
    <div class="screen" id="start"><h1>🧠 Memory</h1><p>Mémorise l'emplacement des chiffres, puis touche-les dans l'ordre croissant une fois qu'ils sont cachés&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Raté&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">niveaux réussis</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var board=document.getElementById('board'),status=document.getElementById('status');
  var scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var BEST='playus_memory_best',best=+localStorage.getItem(BEST)||0;
  var GRID=5,state,level,lives,cells,placed,next,revealed;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function build(){board.style.gridTemplateColumns='repeat('+GRID+',1fr)';board.style.width='min(88vw,'+(GRID*64)+'px)';
    board.innerHTML='';cells=[];for(var i=0;i<GRID*GRID;i++){var c=document.createElement('div');c.className='cell';c.dataset.i=i;board.appendChild(c);cells.push(c);}}
  function newLevel(){build();var count=Math.min(GRID*GRID,2+level);placed={};next=1;revealed=true;
    var idx=[];for(var i=0;i<GRID*GRID;i++)idx.push(i);idx.sort(function(){return Math.random()-0.5;});
    for(var k=0;k<count;k++){placed[idx[k]]=k+1;cells[idx[k]].classList.add('num');cells[idx[k]].textContent=k+1;}
    status.textContent='Mémorise… ('+count+' chiffres)';
    setTimeout(function(){revealed=false;Object.keys(placed).forEach(function(i){cells[i].classList.remove('num');cells[i].classList.add('hidden-num');});
      status.textContent='À toi ! Touche le 1';},Math.max(900,2200-level*70));
  }
  function start(){level=1;lives=1;state='play';scoreEl.textContent='Niv. 1';livesEl.textContent='';
    startScr.classList.add('hidden');overScr.classList.add('hidden');newLevel();}
  function end(){state='over';document.getElementById('finalScore').textContent=level-1;
    if(level-1>best){best=level-1;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='niveaux réussis';overScr.classList.remove('hidden');vibrate([40,60,120]);}
  board.addEventListener('pointerdown',function(e){if(state!=='play'||revealed)return;var c=e.target.closest('.cell');if(!c)return;
    var i=+c.dataset.i;if(!placed[i]||c.classList.contains('good'))return;
    if(placed[i]===next){c.classList.remove('hidden-num');c.classList.add('good');c.textContent=next;next++;vibrate(6);
      if(next>Object.keys(placed).length){level++;scoreEl.textContent='Niv. '+level;vibrate([10,20,10]);setTimeout(newLevel,600);}}
    else{c.classList.add('bad');c.textContent=placed[i];lives--;livesEl.textContent='';
      vibrate([30,40,80]);if(lives<=0)setTimeout(end,500);else{revealed=true;setTimeout(newLevel,900);}}
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
