<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Memory · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 20%,#2a5ad6,#0c1a4a 75%);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#b8d0ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.4rem}.timer{font-size:1.2rem;color:#ffd45e}
  #stage{flex:1;width:100%;max-width:520px;position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
  #board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:min(90vw,400px)}
  .card{aspect-ratio:.8;border-radius:12px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .3s}
  .card.flip{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;backface-visibility:hidden}
  .back{background:linear-gradient(160deg,#4a7de8,#2a4aa0)}.back::after{content:'?';color:rgba(255,255,255,.5);font-weight:900}
  .front{background:#f0f4ff;transform:rotateY(180deg)}
  .card.done .front{background:#a8e0b8}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(8,16,40,.85);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#b8d0ff;max-width:280px;line-height:1.4}
  .big{font-size:3rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#4a7de8,#8b3fd6);box-shadow:0 8px 24px rgba(74,125,232,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0 paires</span><span class="timer" id="timer">0.0</span></div>
  <div id="stage">
    <div id="board"></div>
    <div class="screen" id="start"><h1>🧠 Memory</h1><p>Retourne les cartes deux par deux et retrouve toutes les paires le plus vite possible&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Gagné&nbsp;!</h1><div class="big" id="finalScore">0.0s</div><p id="overMsg"></p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var board=document.getElementById('board');
  var scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var BEST='playus_memory_best',best=+localStorage.getItem(BEST)||0;
  var EMO=['🐶','🐱','🦊','🐼','🦁','🐸','🐵','🐷'];
  var state,cards,first,lock,pairs,t0,raf;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function build(){board.innerHTML='';cards=[];var deck=EMO.concat(EMO).sort(function(){return Math.random()-0.5;});
    deck.forEach(function(e,i){var c=document.createElement('div');c.className='card';c.dataset.e=e;
      c.innerHTML='<div class="face back"></div><div class="face front">'+e+'</div>';board.appendChild(c);cards.push(c);});}
  function start(){build();first=null;lock=false;pairs=0;state='play';scoreEl.textContent='0 paires';
    startScr.classList.add('hidden');overScr.classList.add('hidden');t0=performance.now();cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);}
  function loop(){raf=requestAnimationFrame(loop);if(state==='play')timerEl.textContent=((performance.now()-t0)/1000).toFixed(1);}
  function win(){state='over';cancelAnimationFrame(raf);var t=(performance.now()-t0)/1000;
    document.getElementById('finalScore').textContent=t.toFixed(2)+'s';
    if(!best||t<best){best=t;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='🏆 Nouveau record !';}
    else document.getElementById('overMsg').textContent='Record : '+best.toFixed(2)+'s';
    overScr.classList.remove('hidden');vibrate([15,25,15]);}
  board.addEventListener('pointerdown',function(e){if(state!=='play'||lock)return;var c=e.target.closest('.card');
    if(!c||c.classList.contains('flip')||c.classList.contains('done'))return;
    c.classList.add('flip');vibrate(5);
    if(!first){first=c;return;}
    if(first.dataset.e===c.dataset.e){c.classList.add('done');first.classList.add('done');pairs++;scoreEl.textContent=pairs+' paires';first=null;vibrate(8);
      if(pairs===EMO.length)win();}
    else{lock=true;var a=first,b=c;setTimeout(function(){a.classList.remove('flip');b.classList.remove('flip');first=null;lock=false;},700);}
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
})();
</script>
</body>
</html>
