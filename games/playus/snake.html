<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Snake · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 20%,#0f2a1a,#05100a 75%);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#9ee0b0;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#7fc98f}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:18px;left:0;right:0;text-align:center;color:#9ee0b0;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(5,16,10,.85);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#9ee0b0;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3fb562,#7ac94b);box-shadow:0 8px 24px rgba(63,181,98,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour à l'accueil">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Glisse dans une direction pour tourner</div>
    <div class="screen" id="start"><h1>🐍 Snake</h1><p>Glisse pour diriger le serpent, mange les pommes 🍎 et grandis sans te mordre ni toucher les murs&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Perdu&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">pommes</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR,COLS,ROWS,CELL,ox,oy;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
    CELL=Math.floor(Math.min(W,H)/18);COLS=Math.floor(W/CELL);ROWS=Math.floor(H/CELL);ox=(W-COLS*CELL)/2;oy=(H-ROWS*CELL)/2;}
  addEventListener('resize',resize);
  var BEST='playus_snake_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  var state,snake,dir,nextDir,apple,score,acc,step,lastTs;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function placeApple(){do{apple={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
    while(snake.some(function(s){return s.x===apple.x&&s.y===apple.y;}));}
  function start(){resize();snake=[{x:(COLS/2|0),y:(ROWS/2|0)}];dir={x:1,y:0};nextDir=dir;score=0;step=140;acc=0;lastTs=0;
    placeApple();state='play';scoreEl.textContent='0';startScr.classList.add('hidden');overScr.classList.add('hidden');
    lastTs=performance.now();requestAnimationFrame(loop);}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='pommes';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  var sx,sy;
  stage.addEventListener('pointerdown',function(e){sx=e.clientX;sy=e.clientY;});
  stage.addEventListener('pointerup',function(e){if(state!=='play'||sx==null)return;var dx=e.clientX-sx,dy=e.clientY-sy;
    if(Math.abs(dx)<16&&Math.abs(dy)<16){sx=null;return;}
    if(Math.abs(dx)>Math.abs(dy)){if(dir.x===0)nextDir={x:dx>0?1:-1,y:0};}
    else{if(dir.y===0)nextDir={x:0,y:dy>0?1:-1};}sx=null;});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function tick(){dir=nextDir;var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(function(s){return s.x===head.x&&s.y===head.y;})){end();return;}
    snake.unshift(head);
    if(head.x===apple.x&&head.y===apple.y){score++;scoreEl.textContent=score;step=Math.max(70,step-3);placeApple();vibrate(8);}
    else snake.pop();
  }
  function loop(ts){requestAnimationFrame(loop);var dt=ts-lastTs;lastTs=ts;
    if(state==='play'){acc+=dt;if(acc>=step){acc=0;tick();}}
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.strokeRect(ox,oy,COLS*CELL,ROWS*CELL);
    // apple
    if(apple){ctx.font=CELL+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🍎',ox+apple.x*CELL+CELL/2,oy+apple.y*CELL+CELL/2+1);}
    // snake
    snake&&snake.forEach(function(s,i){ctx.fillStyle=i===0?'#7ac94b':'hsl('+(140-i*2)+',60%,'+(52-i*0.5)+'%)';
      var r=4;var x=ox+s.x*CELL+1,y=oy+s.y*CELL+1,w=CELL-2;
      ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,w,w,r):ctx.rect(x,y,w,w);ctx.fill();});
  }
  resize();requestAnimationFrame(loop);
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
