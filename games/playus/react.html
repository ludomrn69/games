<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>React! · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:#0d1b2a;display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#9ec7f0;text-decoration:none;font-size:1.4rem}.score{font-size:1.2rem;color:#9ec7f0}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  #zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:24px;transition:background .1s}
  #zone.wait{background:#b03a3a}#zone.go{background:#2fb562}#zone.ready{background:#1e3a5a}#zone.early{background:#8a6a1f}
  #zoneBig{font-size:2.4rem;font-weight:900}#zoneSub{font-size:1rem;opacity:.9;max-width:280px;line-height:1.4}
  #result{font-size:3rem;font-weight:900;color:#ffd45e;min-height:1em}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(13,27,42,.9);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#9ec7f0;max-width:280px;line-height:1.4}
  .big{font-size:3.2rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#2fb562,#4bc9c0);box-shadow:0 8px 24px rgba(47,181,98,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour à l'accueil">‹</a><span class="score" id="score">Meilleur : —</span><span></span></div>
  <div id="stage">
    <div id="zone" class="ready">
      <div id="zoneBig">—</div>
      <div id="zoneSub"></div>
      <div id="result"></div>
    </div>
    <div class="screen" id="start"><h1>⚡ React!</h1><p>Attends le <b>vert</b>, puis tape le plus vite possible. Si tu tapes trop tôt, c'est raté&nbsp;!</p><button class="btn" id="startBtn">Commencer</button></div>
  </div>
<script>
(function(){
  var zone=document.getElementById('zone'),zBig=document.getElementById('zoneBig'),zSub=document.getElementById('zoneSub'),result=document.getElementById('result');
  var scoreEl=document.getElementById('score'),startScr=document.getElementById('start');
  var BEST='playus_react_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){scoreEl.textContent=best?'Meilleur : '+best+' ms':'Meilleur : —';}showBest();
  var state,goTime,to;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function arm(){startScr.classList.add('hidden');next();}
  function next(){state='wait';zone.className='zone wait';zone.classList.add('wait');result.textContent='';
    zBig.textContent='Attends…';zSub.textContent='Ne tape pas encore';
    clearTimeout(to);to=setTimeout(function(){state='go';zone.className='go';zBig.textContent='TAPE !';zSub.textContent='';goTime=performance.now();},1000+Math.random()*2600);
  }
  zone.addEventListener('pointerdown',function(){
    if(state==='wait'){clearTimeout(to);state='early';zone.className='early';zBig.textContent='Trop tôt !';zSub.textContent='Tape pour réessayer';vibrate([30,40,80]);state='again';return;}
    if(state==='go'){var rt=Math.round(performance.now()-goTime);state='result';zone.className='ready';
      zBig.textContent=rt+' ms';zSub.textContent='Tape pour rejouer';
      if(!best||rt<best){best=rt;localStorage.setItem(BEST,best);zSub.textContent='🏆 Nouveau record ! Tape pour rejouer';}
      showBest();vibrate(rt<250?[15,25,15]:15);state='again';return;}
    if(state==='again'){next();}
  });
  document.getElementById('startBtn').onclick=arm;
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
