<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Memorizer · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 20%,#c99a1f,#3a2a08 75%);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#ffe9b0;text-decoration:none;font-size:1.4rem}.score{font-size:1.6rem}.best{font-size:.8rem;color:#e6cf8a}
  #stage{flex:1;width:100%;max-width:520px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:18px}
  #status{font-weight:800;font-size:1.05rem;min-height:1.3em;color:#ffe9b0}
  #board{display:grid;gap:10px}
  .tile{aspect-ratio:1;border-radius:12px;background:#5a4a1a;transition:background .15s,transform .08s;cursor:pointer}
  .tile.lit{background:#ffd45e}.tile.good{background:#3fb562}.tile.bad{background:#e8524a}
  .tile:active{transform:scale(.95)}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(30,22,6,.85);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#ffe9b0;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#e8a020,#e8524a);box-shadow:0 8px 24px rgba(232,160,32,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">Niv. 1</span><span class="best" id="best"></span></div>
  <div id="stage">
    <div id="status">Mémorise…</div>
    <div id="board"></div>
    <div class="screen" id="start"><h1>✖️ Memorizer</h1><p>Des tuiles s'allument brièvement. Retrouve-les toutes de mémoire, sans te tromper&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Raté&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">niveaux réussis</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var board=document.getElementById('board'),status=document.getElementById('status');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var BEST='playus_memorizer_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  var state,level,grid,tiles,litSet,found,canPlay;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function build(){grid=Math.min(6,3+Math.floor(level/2));board.style.gridTemplateColumns='repeat('+grid+',1fr)';
    board.style.width='min(84vw,'+ (grid*66) +'px)';board.innerHTML='';tiles=[];
    for(var i=0;i<grid*grid;i++){var t=document.createElement('div');t.className='tile';t.dataset.i=i;board.appendChild(t);tiles.push(t);}}
  function newLevel(){build();var count=Math.min(grid*grid-1,2+level);litSet={};found=0;canPlay=false;
    var idx=[];for(var i=0;i<grid*grid;i++)idx.push(i);idx.sort(function(){return Math.random()-0.5;});
    for(var k=0;k<count;k++)litSet[idx[k]]=true;
    status.textContent='Mémorise…';Object.keys(litSet).forEach(function(i){tiles[i].classList.add('lit');});
    setTimeout(function(){Object.keys(litSet).forEach(function(i){tiles[i].classList.remove('lit');});canPlay=true;status.textContent='À toi ! ('+count+' tuiles)';},Math.max(700,1600-level*40));
  }
  function start(){level=1;state='play';scoreEl.textContent='Niv. 1';startScr.classList.add('hidden');overScr.classList.add('hidden');newLevel();}
  function end(){state='over';document.getElementById('finalScore').textContent=level-1;
    if(level-1>best){best=level-1;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='niveaux réussis';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  board.addEventListener('pointerdown',function(e){if(state!=='play'||!canPlay)return;var t=e.target.closest('.tile');if(!t||t.classList.contains('good'))return;
    var i=+t.dataset.i;
    if(litSet[i]){t.classList.add('good');delete litSet[i];found++;vibrate(6);
      if(Object.keys(litSet).length===0){canPlay=false;level++;scoreEl.textContent='Niv. '+level;vibrate([10,20,10]);setTimeout(newLevel,600);}}
    else{t.classList.add('bad');vibrate([30,40,80]);setTimeout(end,400);}
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
})();
</script>
</body>
</html>
