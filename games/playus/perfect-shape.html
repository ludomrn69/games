<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Perfect Shape · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 30%,#0e2a4a,#06111f 70%);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#9ec7f0;text-decoration:none;font-size:1.4rem}.score{font-size:1.6rem}.lives{font-size:1.2rem}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:26px;left:0;right:0;text-align:center;color:#9ec7f0;font-weight:700;font-size:.95rem}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(6,17,31,.85);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#9ec7f0;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3f8fd6,#4bc9c0);box-shadow:0 8px 24px rgba(63,143,214,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour à l'accueil">‹</a><span class="score" id="score">0</span><span class="lives" id="lives"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Tape quand le cercle remplit le gabarit</div>
    <div class="screen" id="start">
      <h1>🔵 Perfect Shape</h1>
      <p>Un cercle grandit puis rétrécit. Tape à l'instant précis où il tient parfaitement dans l'anneau blanc.</p>
      <button class="btn" id="startBtn">Jouer</button>
    </div>
    <div class="screen hidden" id="over">
      <h1>Fini&nbsp;!</h1>
      <div class="big" id="finalScore">0</div>
      <p id="overMsg">formes parfaites</p>
      <button class="btn" id="replayBtn">Rejouer</button>
    </div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST_KEY='playus_perfectshape_best';var best=+localStorage.getItem(BEST_KEY)||0;
  var state,score,lives,phase,r,dir,target,speed,flash;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function start(){resize();score=0;lives=1;scoreEl.textContent='0';livesEl.textContent='';
    speed=1.7;r=10;dir=1;phase='play';flash=0;state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST_KEY,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='formes parfaites';
    overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(){
    if(state!=='play')return;
    target=Math.min(W,H)*0.30;
    var err=Math.abs(r-target),tol=target*0.14;
    if(err<=tol){var pts=Math.max(5,Math.round((tol-err)/tol*100));score+=pts;scoreEl.textContent=score;
      flash=1;speed=Math.min(6,speed+0.28);vibrate(err<target*0.03?[15,25,15]:15);}
    else{lives--;livesEl.textContent='';vibrate([30,40,80]);
      if(lives<=0){end();return;}}
    r=10;dir=1;
  });
  document.getElementById('startBtn').onclick=start;
  document.getElementById('replayBtn').onclick=start;
  function frame(){
    requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);
    var cx=W/2,cy=H*0.45;target=Math.min(W,H)*0.30;
    if(state==='play'){r+=speed*dir;if(r>=Math.min(W,H)*0.44){dir=-1;}if(r<=10){r=10;dir=1;}
      if(flash>0)flash-=0.08;}
    // gabarit
    ctx.lineWidth=4;ctx.strokeStyle='rgba(255,255,255,'+(0.7).toFixed(2)+')';
    ctx.beginPath();ctx.arc(cx,cy,target,0,7);ctx.stroke();
    ctx.setLineDash([6,10]);ctx.lineWidth=1.5;ctx.strokeStyle='rgba(158,199,240,.5)';
    ctx.beginPath();ctx.arc(cx,cy,target,0,7);ctx.stroke();ctx.setLineDash([]);
    // cercle mobile
    var near=Math.abs(r-target)<target*0.14;
    ctx.beginPath();ctx.arc(cx,cy,r,0,7);
    ctx.fillStyle=flash>0?'rgba(122,201,75,'+(0.5+flash*0.4)+')':(near?'rgba(75,201,192,.7)':'rgba(63,143,214,.65)');
    ctx.fill();
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
