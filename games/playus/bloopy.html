<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Bloopy · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:linear-gradient(180deg,#7a5bff,#3a2a8c);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#e0d8ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#cbbdf5}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#e0d8ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(30,20,80,.8);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#e0d8ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ffb020,#ff7a3d);box-shadow:0 8px 24px rgba(255,122,61,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Tape pour sauter sur le bloc suivant</div>
    <div class="screen" id="start"><h1>🟪 Bloopy</h1><p>Des blocs arrivent en alternance de gauche et de droite. Saute au bon moment pour grimper l'escalier&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Raté&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">sauts</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_bloopy_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  // Le héros reste au centre-bas. Un bloc coulisse horizontalement ; on saute
  // quand il est sous le héros. Réussi => score+, bloc suivant plus rapide.
  var state,score,px,py,jumping,jt,blockX,blockDir,blockSpeed,bw,targetY,phase;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function nextBlock(){bw=Math.max(64,W*0.22);blockDir=Math.random()<0.5?1:-1;blockX=blockDir>0?-bw:W;
    blockSpeed=(Math.max(3,W*0.009)+score*0.12)*blockDir;phase='slide';}
  function start(){resize();score=0;px=W/2;py=H*0.72;jumping=false;jt=0;scoreEl.textContent='0';
    state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');nextBlock();}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='sauts';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  stage.addEventListener('pointerdown',function(){if(state!=='play'||jumping||phase!=='slide')return;
    jumping=true;jt=0;vibrate(8);
    // évalue si le bloc est sous le héros à cet instant
    var hit=px> blockX && px < blockX+bw;
    phase=hit?'good':'bad';
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  var bh=22;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);
    var blockY=py+30;
    if(state==='play'){
      if(phase==='slide'){blockX+=blockSpeed;
        if((blockDir>0&&blockX>W)||(blockDir<0&&blockX+bw<0))end();}
      if(jumping){jt+=0.08;var jump=Math.sin(Math.min(Math.PI,jt*Math.PI));
        if(jt>=1){jumping=false;
          if(phase==='good'){score++;scoreEl.textContent=score;vibrate(12);nextBlock();}
          else end();}
      }
    }
    // bloc
    ctx.fillStyle=phase==='good'?'#ffd45e':'#ffb020';
    ctx.fillRect(blockX,blockY,bw,bh);ctx.fillStyle='#d98a10';ctx.fillRect(blockX,blockY,bw,5);
    // héros
    var jump=jumping?Math.sin(Math.min(Math.PI,jt*Math.PI)):0;
    var hy=py-jump*Math.max(70,H*0.13),r=Math.max(15,W*0.045);
    ctx.beginPath();ctx.arc(px,hy-r,r,0,7);ctx.fillStyle='#fff';ctx.fill();
    ctx.fillStyle='#3a2a8c';ctx.beginPath();ctx.arc(px-r*0.3,hy-r*1.15,r*0.16,0,7);ctx.arc(px+r*0.3,hy-r*1.15,r*0.16,0,7);ctx.fill();
  }
  resize();frame();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
