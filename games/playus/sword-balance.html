<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Sword Balance · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 20%,#3a2350,#140a1e 75%);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#d4c4ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#b8a8e6}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#d4c4ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(20,10,30,.82);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#d4c4ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#8b3fd6,#c94b9e);box-shadow:0 8px 24px rgba(139,63,214,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0.0s</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Glisse ton doigt pour déplacer la base</div>
    <div class="screen" id="start"><h1>⚔️ Sword Balance</h1><p>Fais tenir l'épée en équilibre en déplaçant sa base gauche/droite. Tiens le plus longtemps possible&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Tombée&nbsp;!</h1><div class="big" id="finalScore">0.0s</div><p id="overMsg">équilibre tenu</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_swordbalance_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best.toFixed(1)+'s':'';}showBest();
  // Pendule inversé : angle depuis la verticale. Déplacer la base applique une
  // accélération opposée. La gravité amplifie l'écart.
  var state,angle,angVel,baseX,targetX,t0,len;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function start(){resize();angle=(Math.random()-0.5)*0.06;angVel=0;baseX=W/2;targetX=W/2;t0=performance.now();len=Math.min(H*0.42,260);
    state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';var t=(performance.now()-t0)/1000;document.getElementById('finalScore').textContent=t.toFixed(1)+'s';
    if(t>best){best=t;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='🏆 Record !';}
    else document.getElementById('overMsg').textContent='équilibre tenu';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  function at(e){var rect=cv.getBoundingClientRect();return e.clientX-rect.left;}
  stage.addEventListener('pointerdown',function(e){if(state!=='play')return;targetX=at(e);});
  stage.addEventListener('pointermove',function(e){if(state!=='play')return;targetX=at(e);});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);var baseY=H-70;
    if(state==='play'){var prevBase=baseX;baseX+=(targetX-baseX)*0.2;var baseAcc=(baseX-prevBase);
      angVel+=Math.sin(angle)*0.006;      // gravité
      angVel-=baseAcc*0.0016;             // réaction au déplacement de la base
      angVel*=0.999;angle+=angVel;
      baseX=Math.max(40,Math.min(W-40,baseX));
      if(Math.abs(angle)>0.6)end();
      scoreEl.textContent=((performance.now()-t0)/1000).toFixed(1)+'s';
    }
    // sol
    ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(0,baseY+16,W,4);
    // base (main)
    ctx.font='36px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✋',baseX,baseY+30);
    // épée
    var tipX=baseX+Math.sin(angle)*len,tipY=baseY-Math.cos(angle)*len;
    ctx.strokeStyle='#e6ebf2';ctx.lineWidth=8;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(baseX,baseY);ctx.lineTo(tipX,tipY);ctx.stroke();
    // garde
    var gx=baseX+Math.sin(angle)*22,gy=baseY-Math.cos(angle)*22;
    ctx.save();ctx.translate(gx,gy);ctx.rotate(angle);ctx.fillStyle='#ffd45e';ctx.fillRect(-16,-4,32,8);ctx.restore();
    ctx.fillStyle='#7a5230';ctx.save();ctx.translate(baseX,baseY);ctx.rotate(angle);ctx.fillRect(-4,-2,8,20);ctx.restore();
  }
  resize();frame();
})();
</script>
</body>
</html>
