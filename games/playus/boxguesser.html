<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Boxguesser · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 25%,#1f5a7a,#08202e 75%);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#a8e0f0;text-decoration:none;font-size:1.4rem}.score{font-size:1.6rem}.level{font-size:1.1rem;color:#a8e0f0}
  #stage{flex:1;width:100%;max-width:520px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:16px}
  canvas{background:rgba(3,16,24,.55);border-radius:16px;max-width:92vw;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  #status{font-weight:800;font-size:1.05rem;min-height:1.3em;color:#a8e0f0;text-align:center}
  #controls{display:flex;flex-direction:column;align-items:center;gap:14px}
  #controls.hidden{display:none}
  #stepper{display:flex;align-items:center;gap:16px}
  .step{width:74px;height:74px;border-radius:22px;border:none;background:#1e4a5e;color:#fff;font-size:2.6rem;font-weight:900;
    cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 6px 0 #123543;transition:transform .07s,box-shadow .07s}
  .step:active{transform:translateY(4px);box-shadow:0 2px 0 #123543}
  #guess{font-size:3.4rem;font-weight:900;min-width:120px;text-align:center;color:#ffd45e}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(8,24,34,.88);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#a8e0f0;max-width:290px;line-height:1.45}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;
    background:linear-gradient(135deg,#3fb5c9,#4b9ed6);box-shadow:0 8px 24px rgba(63,181,201,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="level" id="level">Niveau 1</span></div>
  <div id="stage">
    <canvas id="cv" width="320" height="320"></canvas>
    <div id="status">Compte les cubes qui passent…</div>
    <div id="controls" class="hidden">
      <div id="stepper">
        <button class="step" id="minus" aria-label="moins">−</button>
        <span id="guess">0</span>
        <button class="step" id="plus" aria-label="plus">+</button>
      </div>
      <button class="btn" id="validate">Valider</button>
    </div>
    <div class="screen" id="start"><h1>📦 Boxguesser</h1><p>Des cubes défilent sur le plateau, de plus en plus vite&nbsp;! Compte-les, puis règle le compteur avec + et − et valide. Une erreur et c'est fini.</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Fini&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">niveaux réussis</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  var statusEl=document.getElementById('status'),controls=document.getElementById('controls'),guessEl=document.getElementById('guess');
  var scoreEl=document.getElementById('score'),levelEl=document.getElementById('level');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var BEST='playus_boxguesser_best',best=+localStorage.getItem(BEST)||0;
  var COLS=5,ROWS=5,cell=64;               // fenêtre visible : plateau 5×5
  var state='start',score=0,level=1,answer=0,guess=0;
  var strip=[],stripCols=0,scrollX=0,speed=0,lastTs=0;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}

  function resize(){
    cell=Math.floor(Math.min(window.innerWidth*0.9,360)/COLS);
    cv.width=cell*COLS;cv.height=cell*ROWS;
    if(state!=='scroll')drawBoard();
  }
  window.addEventListener('resize',resize);

  // Grille de fond (le « plateau » vide).
  function drawBoard(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.strokeStyle='rgba(168,224,240,.10)';ctx.lineWidth=1;
    for(var c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*cell,0);ctx.lineTo(c*cell,cv.height);ctx.stroke();}
    for(var r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*cell);ctx.lineTo(cv.width,r*cell);ctx.stroke();}
  }

  // Un cube pseudo-3D dans la case dont le coin haut-gauche est (px,py).
  function drawCube(px,py){
    var m=cell*0.12,d=cell*0.18,x=px+m,y=py+m,w=cell-2*m,fw=w-d,fh=w-d,fx=x,fy=y+d;
    ctx.fillStyle='#f0b429';ctx.fillRect(fx,fy,fw,fh);                              // face avant
    ctx.fillStyle='#ffd45e';ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx+d,fy-d);
      ctx.lineTo(fx+fw+d,fy-d);ctx.lineTo(fx+fw,fy);ctx.closePath();ctx.fill();     // dessus
    ctx.fillStyle='#c8930f';ctx.beginPath();ctx.moveTo(fx+fw,fy);ctx.lineTo(fx+fw+d,fy-d);
      ctx.lineTo(fx+fw+d,fy+fh-d);ctx.lineTo(fx+fw,fy+fh);ctx.closePath();ctx.fill();// côté droit
    ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1;ctx.strokeRect(fx,fy,fw,fh);
  }

  // Rend le bandeau en train de défiler dans la fenêtre 5 colonnes.
  function drawScroll(){
    drawBoard();
    for(var c=0;c<stripCols;c++){
      var sx=cv.width+c*cell-scrollX;                 // colonne c → position écran
      if(sx>cv.width||sx<-cell)continue;              // hors fenêtre
      for(var r=0;r<ROWS;r++)if(strip[c][r])drawCube(sx,r*cell);
    }
  }

  // Construit un bandeau aléatoire de `count` cubes ; plus le niveau monte, plus
  // il est long, dense et rapide (« formes de plus en plus complexes »).
  function buildRound(){
    var count=3+level;                                // niveau 1 → 4 cubes
    stripCols=Math.max(6,Math.ceil(count/2)+3);
    strip=[];for(var c=0;c<stripCols;c++){strip.push([]);for(var r=0;r<ROWS;r++)strip[c][r]=false;}
    var placed=0,cells=stripCols*ROWS,guard=0;
    while(placed<count&&placed<cells&&guard++<2000){
      var c=Math.floor(Math.random()*stripCols),r=Math.floor(Math.random()*ROWS);
      if(!strip[c][r]){strip[c][r]=true;placed++;}
    }
    answer=placed;
    speed=cell*(1.6+level*0.22);                      // px/s, accélère par niveau
    scrollX=0;
  }

  function loop(ts){
    if(state!=='scroll')return;
    if(!lastTs)lastTs=ts;var dt=Math.min(0.05,(ts-lastTs)/1000);lastTs=ts;
    scrollX+=speed*dt;drawScroll();
    if(scrollX>=cv.width+stripCols*cell){toGuess();return;}   // tout est sorti à gauche
    requestAnimationFrame(loop);
  }

  function round(){
    buildRound();guess=1;guessEl.textContent='1';
    controls.classList.add('hidden');
    statusEl.textContent='Compte les cubes qui passent…';
    levelEl.textContent='Niveau '+level;
    state='scroll';lastTs=0;requestAnimationFrame(loop);
  }

  function toGuess(){
    state='guess';drawBoard();
    controls.classList.remove('hidden');
    statusEl.textContent='Combien de cubes as-tu vus ?';
  }

  function start(){score=0;level=1;scoreEl.textContent='0';
    startScr.classList.add('hidden');overScr.classList.add('hidden');round();}

  function end(){state='over';controls.classList.add('hidden');
    document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='niveaux réussis';
    overScr.classList.remove('hidden');vibrate([40,60,120]);}

  function bump(d){if(state!=='guess')return;guess=Math.max(0,guess+d);guessEl.textContent=guess;vibrate(6);}
  document.getElementById('minus').onclick=function(){bump(-1);};
  document.getElementById('plus').onclick=function(){bump(1);};

  document.getElementById('validate').onclick=function(){
    if(state!=='guess')return;
    if(guess===answer){
      score++;level++;scoreEl.textContent=score;vibrate(10);
      statusEl.textContent='Bravo ! 🎉';controls.classList.add('hidden');
      setTimeout(round,700);
    }else{
      statusEl.textContent='C\'était '+answer+' cubes';vibrate([30,40,80]);
      setTimeout(end,900);
    }
  };

  document.getElementById('startBtn').onclick=start;
  document.getElementById('replayBtn').onclick=start;
  resize();drawBoard();
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
