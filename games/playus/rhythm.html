<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Rhythm · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 25%,#2a2a6a,#0a0a20 75%);display:flex;flex-direction:column;align-items:center;touch-action:manipulation}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#b8b8ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.lives{font-size:1.2rem}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  #judge{position:absolute;top:16%;left:0;right:0;text-align:center;font-weight:900;font-size:1.4rem;min-height:1.4em;pointer-events:none}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#b8b8ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(8,8,26,.85);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#b8b8ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#5a5ad6,#c94b9e);box-shadow:0 8px 24px rgba(90,90,214,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="lives" id="lives"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="judge"></div>
    <div class="hint">Tape quand l'anneau touche le cercle</div>
    <div class="screen" id="start"><h1>🥁 Rhythm</h1><p>Un anneau se referme sur le bouton. Tape pile au moment de l'impact parfait, en rythme&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Fini&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">temps parfaits</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage'),judge=document.getElementById('judge');
  var scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_rhythm_best',best=+localStorage.getItem(BEST)||0;
  var ac;function beat(perfect){try{ac=ac||new (window.AudioContext||window.webkitAudioContext)();var o=ac.createOscillator(),g=ac.createGain();
    o.frequency.value=perfect?660:440;o.type='square';o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.0001,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.25,ac.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+0.15);
    o.start();o.stop(ac.currentTime+0.17);}catch(e){}}
  var state,score,lives,period,t0,tapped;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function start(){resize();score=0;lives=1;period=1400;t0=performance.now();tapped=false;
    try{ac=ac||new (window.AudioContext||window.webkitAudioContext)();}catch(e){}
    state='play';scoreEl.textContent='0';livesEl.textContent='';judge.textContent='';startScr.classList.add('hidden');overScr.classList.add('hidden');requestAnimationFrame(loop);}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='temps parfaits';overScr.classList.remove('hidden');vibrate([40,60,120]);}
  function loseLife(txt){lives--;livesEl.textContent='';
    judge.style.color='#e8524a';judge.textContent=txt;vibrate([30,40,80]);if(lives<=0)setTimeout(end,300);}
  stage.addEventListener('pointerdown',function(){if(state!=='play'||tapped)return;tapped=true;
    var phase=((performance.now()-t0)%period)/period; // 0..1, impact à 1 (ou 0)
    var err=Math.min(phase,1-phase); // distance au beat
    if(err<0.06){score++;scoreEl.textContent=score;judge.style.color='#7ac94b';judge.textContent=err<0.025?'PARFAIT !':'Bien !';beat(true);period=Math.max(650,period-25);vibrate(err<0.025?[10,20,10]:8);}
    else{loseLife('Raté !');beat(false);}
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  var lastBeat=0;
  function loop(ts){requestAnimationFrame(loop);ctx.clearRect(0,0,W,H);var cx=W/2,cy=H*0.5,R=Math.min(W,H)*0.24;
    var phase=state==='play'?(((performance.now()-t0)%period)/period):0;
    // détecte passage du beat (impact) pour reset tapped + rater si pas tapé
    if(state==='play'){var beatIndex=Math.floor((performance.now()-t0)/period);
      if(beatIndex>lastBeat){lastBeat=beatIndex;if(!tapped)loseLife('Trop tard !');tapped=false;judge.textContent&&setTimeout(function(){},0);}}
    // cercle bouton
    ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.fillStyle='#5a5ad6';ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold '+(R*0.5)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('♪',cx,cy+2);
    // anneau qui se referme (de 2.4R -> R au moment du beat)
    var rr=R*(1+ (1-phase)*1.4);var near=Math.min(phase,1-phase)<0.06;
    ctx.beginPath();ctx.arc(cx,cy,rr,0,7);ctx.lineWidth=6;ctx.strokeStyle=near?'#7ac94b':'#ffd45e';ctx.stroke();
  }
  resize();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
