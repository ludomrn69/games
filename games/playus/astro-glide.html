<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Astro Glide · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 30%,#101d4a,#03040f 75%);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#9ec7f0;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.best{font-size:.8rem;color:#8aa8d6}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#9ec7f0;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(4,6,20,.85);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#9ec7f0;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3f8fd6,#8b3fd6);box-shadow:0 8px 24px rgba(63,143,214,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="best" id="best"></span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Glisse pour piloter le vaisseau</div>
    <div class="screen" id="start"><h1>🚀 Astro Glide</h1><p>Pilote le vaisseau et esquive les vagues de météorites. Tiens le plus longtemps possible&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Collision&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">distance</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_astroglide_best',best=+localStorage.getItem(BEST)||0;
  function showBest(){bestEl.textContent=best?'⭐ '+best:'';}showBest();
  var state,score,shipX,shipY,rocks=[],stars=[],speed,spawnAcc,dist;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function start(){resize();score=0;dist=0;shipX=W/2;shipY=H-110;rocks=[];speed=Math.max(3,H*0.006);spawnAcc=0;
    stars=[];for(var i=0;i<60;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5});
    state='play';scoreEl.textContent='0';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='distance';showBest();overScr.classList.remove('hidden');vibrate([40,60,120]);}
  function at(e){var rect=cv.getBoundingClientRect();return {x:e.clientX-rect.left,y:e.clientY-rect.top};}
  var dragging=false;
  stage.addEventListener('pointerdown',function(e){if(state!=='play')return;dragging=true;var p=at(e);shipX=p.x;shipY=Math.min(H-40,Math.max(H*0.4,p.y));});
  stage.addEventListener('pointermove',function(e){if(!dragging||state!=='play')return;var p=at(e);shipX=p.x;shipY=Math.min(H-40,Math.max(H*0.4,p.y));});
  stage.addEventListener('pointerup',function(){dragging=false;});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#fff';stars.forEach(function(s){s.y+=s.s*(state==='play'?2:0.5);if(s.y>H){s.y=0;s.x=Math.random()*W;}
      ctx.globalAlpha=s.s/2.5;ctx.fillRect(s.x,s.y,s.s,s.s);});ctx.globalAlpha=1;
    if(state==='play'){speed+=0.0018;dist+=speed;score=Math.floor(dist/30);scoreEl.textContent=score;spawnAcc+=speed;
      if(spawnAcc>Math.max(120,300-score*2)){spawnAcc=0;var r=Math.max(16,W*0.05)+Math.random()*W*0.04;
        rocks.push({x:r+Math.random()*(W-2*r),y:-r,r:r,vy:speed*(0.7+Math.random()*0.6),rot:0,vr:(Math.random()-0.5)*0.1});}
      shipX=Math.max(20,Math.min(W-20,shipX));
      for(var i=rocks.length-1;i>=0;i--){var o=rocks[i];o.y+=o.vy;o.rot+=o.vr;
        var dx=o.x-shipX,dy=o.y-shipY;if(dx*dx+dy*dy<(o.r+16)*(o.r+16)){end();return;}
        if(o.y>H+o.r)rocks.splice(i,1);}
    }
    rocks.forEach(function(o){ctx.save();ctx.translate(o.x,o.y);ctx.rotate(o.rot);ctx.beginPath();
      for(var a=0;a<8;a++){var rr=o.r*(0.8+((a*7)%3)*0.1);ctx.lineTo(Math.cos(a/8*6.283)*rr,Math.sin(a/8*6.283)*rr);}
      ctx.closePath();ctx.fillStyle='#8a7a6a';ctx.fill();ctx.fillStyle='#6a5a4a';ctx.beginPath();ctx.arc(-o.r*0.2,-o.r*0.2,o.r*0.2,0,7);ctx.fill();ctx.restore();});
    // vaisseau
    ctx.save();ctx.translate(shipX,shipY);
    ctx.fillStyle='#ff7a3d';ctx.beginPath();ctx.moveTo(0,26);ctx.lineTo(-8,16);ctx.lineTo(8,16);ctx.fill();
    ctx.fillStyle='#e6ebf2';ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(-14,18);ctx.lineTo(14,18);ctx.closePath();ctx.fill();
    ctx.fillStyle='#3f8fd6';ctx.beginPath();ctx.arc(0,0,6,0,7);ctx.fill();ctx.restore();
  }
  resize();frame();
})();
</script>
</body>
</html>
