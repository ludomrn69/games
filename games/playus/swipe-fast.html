<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Swipe Fast! · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 20%,#d65a1f,#3a1608 75%);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#ffd0a8;text-decoration:none;font-size:1.4rem}.score{font-size:1.6rem}.timer{font-size:1.2rem;color:#ffd45e}
  #stage{flex:1;width:100%;max-width:520px;position:relative;display:flex;align-items:center;justify-content:center}
  #arrow{font-size:min(45vw,220px);line-height:1;transition:transform .05s;filter:drop-shadow(0 8px 20px rgba(0,0,0,.4))}
  .flash{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .12s}
  .flash.good{background:rgba(63,181,98,.35);opacity:1}.flash.bad{background:rgba(232,82,74,.4);opacity:1}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(30,10,4,.85);backdrop-filter:blur(6px);z-index:10}
  .screen.hidden{display:none}.screen h1{font-size:2rem;font-weight:900}.screen p{color:#ffd0a8;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#ff8a3d,#e8524a);box-shadow:0 8px 24px rgba(232,82,74,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html" aria-label="Retour à l'accueil">‹</a><span class="score" id="score">0</span><span class="timer" id="timer">20</span></div>
  <div id="stage">
    <div id="arrow">→</div>
    <div class="flash" id="flash"></div>
    <div class="screen" id="start"><h1>➡️ Swipe Fast!</h1><p>Glisse ton doigt dans le sens de la flèche, le plus vite possible&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1 id="overTitle">Temps écoulé&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">bons swipes</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var arrow=document.getElementById('arrow'),flash=document.getElementById('flash'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var BEST='playus_swipefast_best',best=+localStorage.getItem(BEST)||0;
  var DIRS=[['→','right','rotate(0deg)'],['←','left','rotate(0deg)'],['↑','up','rotate(0deg)'],['↓','down','rotate(0deg)']];
  var state,score,timeLeft,tickT,cur,sx,sy;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function newArrow(){cur=DIRS[Math.floor(Math.random()*4)];arrow.textContent=cur[0];}
  function start(){score=0;timeLeft=20;scoreEl.textContent='0';timerEl.textContent='20';
    state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');newArrow();
    clearInterval(tickT);tickT=setInterval(function(){timeLeft--;timerEl.textContent=timeLeft;if(timeLeft<=0)end();},1000);
  }
  function end(){state='over';clearInterval(tickT);document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='bons swipes';overScr.classList.remove('hidden');vibrate([40,60,120]);}
  function showFlash(ok){flash.className='flash '+(ok?'good':'bad');setTimeout(function(){flash.className='flash';},120);}
  stage.addEventListener('pointerdown',function(e){sx=e.clientX;sy=e.clientY;});
  stage.addEventListener('pointerup',function(e){if(state!=='play'||sx==null)return;
    var dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)<24&&Math.abs(dy)<24){sx=null;return;}
    var dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');
    if(dir===cur[1]){score++;scoreEl.textContent=score;showFlash(true);vibrate(8);newArrow();}
    else{score=Math.max(0,score-1);scoreEl.textContent=score;showFlash(false);vibrate([20,30,60]);}
    sx=null;
  });
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
})();
</script>
<script src="../../sfx.js"></script>
<script src="../../playus-extra.js"></script>
</body>
</html>
