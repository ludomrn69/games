<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Bouncy · Playus Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;overflow:hidden;user-select:none;
    background:radial-gradient(circle at 50% 25%,#5b3fd6,#1e1050 75%);display:flex;flex-direction:column;align-items:center;touch-action:none}
  .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800}
  .hud a{color:#ddd4ff;text-decoration:none;font-size:1.4rem}.score{font-size:1.7rem}.lives{font-size:1.2rem}
  #stage{flex:1;width:100%;max-width:520px;position:relative}
  canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#ddd4ff;font-weight:700;font-size:.9rem;pointer-events:none}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px;background:rgba(20,12,60,.82);backdrop-filter:blur(6px)}
  .screen.hidden{display:none}.screen h1{font-size:2.2rem;font-weight:900}.screen p{color:#ddd4ff;max-width:280px;line-height:1.4}
  .big{font-size:3.4rem;font-weight:900;color:#ffd45e}
  .btn{border:none;border-radius:16px;padding:16px 40px;font-size:1.15rem;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#e8524a,#c94b9e);box-shadow:0 8px 24px rgba(232,82,74,.45);font-family:inherit}
  .btn:active{transform:scale(.96)}
</style>
</head>
<body>
  <div class="hud"><a href="../../index.html">‹</a><span class="score" id="score">0</span><span class="lives" id="lives">❤️❤️❤️</span></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div class="hint">Glisse ton doigt sous la balle pour la renvoyer en l'air</div>
    <div class="screen" id="start"><h1>🔴 Bouncy</h1><p>Sers-toi de ton doigt comme d'un rebondisseur pour propulser la balle et éclater les cibles, sans la laisser tomber&nbsp;!</p><button class="btn" id="startBtn">Jouer</button></div>
    <div class="screen hidden" id="over"><h1>Tombée&nbsp;!</h1><div class="big" id="finalScore">0</div><p id="overMsg">cibles touchées</p><button class="btn" id="replayBtn">Rejouer</button></div>
  </div>
<script>
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),stage=document.getElementById('stage');
  var scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives');
  var startScr=document.getElementById('start'),overScr=document.getElementById('over');
  var W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);
  var BEST='playus_bouncy_best',best=+localStorage.getItem(BEST)||0;
  var PAL=['#ffd45e','#4ec97a','#4bc9c0','#ff9838','#ff7ad6'];
  var state,score,lives,ball,r,g,targets,finger,fingerOn,px,py,ppx,ppy;
  function vibrate(m){if(navigator.vibrate)navigator.vibrate(m);}
  function spawnTargets(){targets=[];var n=5,m=44;for(var i=0;i<n;i++)targets.push({x:m+Math.random()*(W-2*m),y:H*0.14+Math.random()*H*0.22,r:Math.max(20,W*0.055),c:PAL[i%PAL.length]});}
  function start(){resize();score=0;lives=3;r=Math.max(15,W*0.045);g=Math.max(0.3,H*0.0006);
    ball={x:W/2,y:H*0.5,vx:(Math.random()-0.5)*4,vy:-6};spawnTargets();fingerOn=false;
    scoreEl.textContent='0';livesEl.textContent='❤️❤️❤️';state='play';startScr.classList.add('hidden');overScr.classList.add('hidden');}
  function end(){state='over';document.getElementById('finalScore').textContent=score;
    if(score>best){best=score;localStorage.setItem(BEST,best);document.getElementById('overMsg').textContent='Record ! 🏆';}
    else document.getElementById('overMsg').textContent='cibles touchées';overScr.classList.remove('hidden');vibrate([40,60,120]);}
  function at(e){var rect=cv.getBoundingClientRect();return {x:e.clientX-rect.left,y:e.clientY-rect.top};}
  stage.addEventListener('pointerdown',function(e){var p=at(e);px=ppx=p.x;py=ppy=p.y;fingerOn=true;});
  stage.addEventListener('pointermove',function(e){if(!fingerOn)return;var p=at(e);ppx=px;ppy=py;px=p.x;py=p.y;});
  stage.addEventListener('pointerup',function(){fingerOn=false;});stage.addEventListener('pointercancel',function(){fingerOn=false;});
  document.getElementById('startBtn').onclick=start;document.getElementById('replayBtn').onclick=start;
  function loseLife(){lives--;livesEl.textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(3-Math.max(0,lives));vibrate([30,40,80]);
    if(lives<=0){end();return;}ball.x=W/2;ball.y=H*0.5;ball.vx=(Math.random()-0.5)*4;ball.vy=-6;}
  var bumpR=34;
  function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,H);
    if(state==='play'){ball.vy+=g;ball.x+=ball.vx;ball.y+=ball.vy;
      if(ball.x<r){ball.x=r;ball.vx=Math.abs(ball.vx);}if(ball.x>W-r){ball.x=W-r;ball.vx=-Math.abs(ball.vx);}
      if(ball.y<r){ball.y=r;ball.vy=Math.abs(ball.vy)*0.8;}
      // rebondisseur = doigt
      if(fingerOn){var dx=ball.x-px,dy=ball.y-py,d=Math.hypot(dx,dy);
        if(d<r+bumpR){var nx=dx/(d||1),ny=dy/(d||1);ball.x=px+nx*(r+bumpR);ball.y=py+ny*(r+bumpR);
          var vdotn=ball.vx*nx+ball.vy*ny;ball.vx-=2*vdotn*nx;ball.vy-=2*vdotn*ny;
          // ajoute l'élan du doigt
          ball.vx+=(px-ppx)*0.4;ball.vy+=(py-ppy)*0.4-2;var sp=Math.hypot(ball.vx,ball.vy);if(sp>18){ball.vx*=18/sp;ball.vy*=18/sp;}
          vibrate(8);}}
      // cibles
      for(var i=targets.length-1;i>=0;i--){var t=targets[i];if(Math.hypot(ball.x-t.x,ball.y-t.y)<r+t.r){
        targets.splice(i,1);score++;scoreEl.textContent=score;vibrate(10);
        if(!targets.length)spawnTargets();}}
      if(ball.y-r>H)loseLife();
    }
    targets&&targets.forEach(function(t){ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,7);ctx.fillStyle=t.c;ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(t.x-t.r*0.3,t.y-t.r*0.3,t.r*0.25,0,7);ctx.fill();});
    if(fingerOn){ctx.beginPath();ctx.arc(px,py,bumpR,0,7);ctx.fillStyle='rgba(255,255,255,.22)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=3;ctx.stroke();}
    ctx.beginPath();ctx.arc(ball.x,ball.y,r,0,7);var grd=ctx.createRadialGradient(ball.x-r*0.3,ball.y-r*0.3,r*0.2,ball.x,ball.y,r);
    grd.addColorStop(0,'#fff');grd.addColorStop(1,'#e8524a');ctx.fillStyle=grd;ctx.fill();
  }
  resize();frame();
})();
</script>
</body>
</html>
